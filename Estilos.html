<style>
    :root {
        --c-primary: #00417B;
        --c-cyan: #00CEFE;
        --c-pink: #EE2A6E;
        --c-yellow: #FFDF43;
        --c-orange: #FF6139;
        --c-purple: #A255FF;

        --line: #e6e6e6;
        --muted: #64748b;

        --sidebar-w: 300px;
        --sidebar-collapsed-w: 88px;

        --sb-bg: #073a63;
        --sb-txt: #ffffff;
        --sb-txt-2: rgba(255, 255, 255, .78);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
        margin: 0;
        font-family: system-ui, Arial;
        background: #fff;
        color: #0f172a;
        overflow: hidden;
    }

    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .45);
        display: none;
        z-index: 60;
        backdrop-filter: blur(2px);
    }
    .overlay.show { display: block; }

    .app {
        height: 100vh;
        width: 100%;
        display: flex;
        position: relative;
        overflow: hidden;
    }

    .sidebar {
        width: var(--sidebar-w);
        background: var(--sb-bg);
        color: var(--sb-txt);
        display: flex;
        flex-direction: column;
        padding: 18px 16px 14px;
        transition: width .22s ease, padding .22s ease, transform .22s ease;
        position: sticky;
        top: 0;
        height: 100vh;
        flex: 0 0 auto;
        overflow: hidden;
    }

    .app.sidebar-collapsed .sidebar {
        width: var(--sidebar-collapsed-w);
        padding: 18px 10px 14px;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 6px 12px;
    }

    .brand img {
        height: 44px;
        width: 44px;
        object-fit: contain;
        border-radius: 12px;
    }

    .brand-text { min-width: 0; }

    .brand-title {
        font-size: 18px;
        font-weight: 950;
        letter-spacing: .6px;
        line-height: 1.1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .brand-sub {
        margin-top: 4px;
        font-size: 12px;
        color: var(--sb-txt-2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .app.sidebar-collapsed .brand { justify-content: center; padding: 6px 0 12px; }
    .app.sidebar-collapsed .brand .brand-text { display: none; }

    .brand-sep {
        height: 1px;
        width: 100%;
        margin: 2px 0 10px;
        background: rgba(255, 255, 255, .14);
    }

    .accents {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 2px 12px;
    }

    .accent-line {
        flex: 1;
        height: 6px;
        border-radius: 999px;
        opacity: .95;
    }

    .accent-line.c1 { background: var(--c-cyan); }
    .accent-line.c2 { background: var(--c-pink); }
    .accent-line.c3 { background: var(--c-yellow); }
    .accent-line.c4 { background: var(--c-orange); }
    .accent-line.c5 { background: var(--c-purple); }

    .sb-search {
        margin: 2px 6px 10px;
        padding: 12px 14px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, .08);
    }

    .sb-search input {
        width: 100%;
        border: 0;
        outline: none;
        background: transparent;
        color: #fff;
        font-weight: 800;
        font-size: 14px;
    }

    .app.sidebar-collapsed .sb-search { justify-content: center; padding: 12px; }
    .app.sidebar-collapsed .sb-search input { display: none; }

    .menu {
        flex: 1 1 auto;
        overflow: auto;
        padding: 10px 6px 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scrollbar-width: none;
    }

    .menu-link, .menu-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px;
        border: 0;
        cursor: pointer;
        text-decoration: none;
        background: transparent;
        color: #fff;
        border-radius: 18px;
        font: inherit;
        font-weight: 950;
        transition: background .16s ease;
    }

    .menu-link:hover, .menu-btn:hover { background: rgba(255, 255, 255, .08); }
    
    .menu-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .menu-left i { width: 28px; text-align: center; font-size: 20px; }
    .menu-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .menu-link.active { background: #fff; color: var(--c-primary); }
    .menu-link.active i { color: var(--c-primary); }

    .chev { opacity: .88; transition: transform .18s ease; }
    .menu-item.open .chev { transform: rotate(180deg); }

    .submenu {
        display: none;
        margin: 4px 8px 10px;
        padding: 8px;
        border-radius: 16px;
        background: rgba(255, 255, 255, .06);
    }
    .menu-item.open .submenu { display: block; }

    .submenu a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 12px;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        font-weight: 900;
    }
    .submenu a:hover { background: rgba(255, 255, 255, .08); }
    .submenu a.active { background: #fff; color: var(--c-primary); }

    .sidebar-footer {
        flex: 0 0 auto;
        padding: 12px 10px 6px;
        color: rgba(255, 255, 255, .86);
        font-size: 12px;
        line-height: 1.35;
        border-top: 1px solid rgba(255, 255, 255, .10);
    }

    .main {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #fff;
        height: 100vh;
        overflow: hidden;
    }

    .topbar {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #fff;
    }

    .btn-icon {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 14px;
        padding: 10px 12px;
        cursor: pointer;
        min-width: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .page-title {
        font-size: 16px;
        font-weight: 950;
        color: var(--c-primary);
        flex: 1;
        margin-left: 12px;
    }

    .btn {
        border: 1px solid var(--line);
        background: #fff;
        padding: 10px 12px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 950;
    }

    .content-scroll { flex: 1; overflow: auto; }
    .content { padding: 18px; width: 100%; margin: 0 auto; max-width: 1200px; }

    .sb-popover {
        position: fixed;
        z-index: 2000;
        display: none;
        width: 280px;
        padding: 10px;
        border-radius: 18px;
        background: rgba(7, 58, 99, .92);
        box-shadow: 0 18px 50px rgba(0, 0, 0, .35);
        backdrop-filter: blur(10px);
        color: #fff;
    }

    .pop-title { font-weight: 950; padding: 10px 12px; border-radius: 14px; background: rgba(255, 255, 255, .06); margin-bottom: 10px; }
    .pop-list a { display: flex; align-items: center; gap: 10px; padding: 12px 12px; border-radius: 14px; color: #fff; text-decoration: none; font-weight: 900; }
    .pop-list a:hover { background: rgba(255, 255, 255, .10); }
    .pop-list a.active { background: #fff; color: var(--c-primary); }

    @media (max-width: 900px) {
        .sidebar { position: fixed; transform: translateX(-100%); z-index: 80; }
        .sidebar.open { transform: translateX(0); }
    }

    /* UTILS & HELPERS */
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-end { justify-content: flex-end; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .mr-2 { margin-right: 8px; }
    .mt-4 { margin-top: 16px; }
    .p-10 { padding: 40px; }
    
    .font-black { font-weight: 950; }
    .font-bold { font-weight: 800; }
    .text-xs { font-size: 11px; }
    .text-sm { font-size: 13px; }
    .text-muted { color: var(--muted); }
    .text-primary { color: var(--c-primary); }
    .text-blue-600 { color: #2563eb; }
    .text-slate-400 { color: #94a3b8; }
    .text-slate-700 { color: #334155; }
    .text-slate-800 { color: #1e293b; }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* PREMIUM COMPONENTS */
    .btn-app {
        background: var(--c-primary); color: #fff; border: 0;
        padding: 12px 24px; border-radius: 14px; font-weight: 950;
        cursor: pointer; transition: all .2s ease;
        box-shadow: 0 10px 15px -3px rgba(0, 65, 123, 0.2);
    }
    .btn-app:hover { transform: translateY(-2px); box-shadow: 0 15px 20px -5px rgba(0, 65, 123, 0.3); }
    .btn-app:active { transform: translateY(0); }

    .btn-obs {
        background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
        padding: 12px 24px; border-radius: 14px; font-weight: 950;
        cursor: pointer; transition: all .2s ease;
    }
    .btn-obs:hover { background: #e2e8f0; color: #1e293b; }

    .badge {
        padding: 4px 12px; border-radius: 999px; font-size: 10px; font-weight: 950;
        text-transform: uppercase; letter-spacing: .5px; border: 1px solid transparent;
    }
    .badge-primary { background: #eff6ff; color: #1d4ed8; border-color: #dbeafe; }
    .badge-success { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
    .badge-warning { background: #fef3c7; color: #b45309; border-color: #fde68a; }
    .badge-danger { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }

    /* ANIMATIONS */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
