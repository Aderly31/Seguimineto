<div id="bandeja_root">
    <style>
        :root {
            --uac-blue: #00417B;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        .bandeja-layout { display: grid; grid-template-columns: 280px 1fr 300px; gap: 24px; }
        
        /* Sidebar Left */
        .sidebar-left { background: white; border-radius: 20px; border: 1px solid var(--border-color); padding: 20px; height: calc(100vh - 120px); overflow-y: auto; }
        .sidebar-left h3 { font-size: 14px; font-weight: 900; margin-bottom: 16px; color: var(--text-main); text-transform: uppercase; }
        .area-list { display: flex; flex-direction: column; gap: 8px; }
        .area-item { 
            padding: 12px 16px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-muted);
            border: 1px solid transparent; transition: all 0.2s;
        }
        .area-item:hover { background: #f8fafc; color: var(--uac-blue); }
        .area-item.active { background: #eff6ff; color: var(--uac-blue); border-color: #bfdbfe; }

        /* Main Content */
        .main-content { display: flex; flex-direction: column; gap: 24px; }
        
        .header-premium { 
            background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
            padding: 30px; border-radius: 20px; color: white;
        }
        .header-premium h1 { font-size: 24px; font-weight: 950; margin: 0; letter-spacing: -1px; }
        
        /* Tabs */
        .tabs-nav { display: flex; gap: 4px; border-bottom: 2px solid var(--border-color); margin-bottom: 16px; }
        .tab-btn { 
            padding: 10px 20px; font-weight: 800; font-size: 13px; color: var(--text-muted); 
            background: none; border: none; cursor: pointer; position: relative;
        }
        .tab-btn.active { color: var(--uac-blue); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background: var(--uac-blue); }

        .table-container { background: white; border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; min-height: 300px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th { background: #f8fafc; padding: 12px; text-align: left; font-weight: 800; color: #475569; border-bottom: 1px solid var(--border-color); }
        .data-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .evidence-link { color: #2563eb; font-weight: 700; text-decoration: none; font-size: 11px; }

        /* Decision Section */
        .decision-card { background: white; border-radius: 20px; border: 1px solid var(--border-color); padding: 24px; }
        .decision-card h3 { font-size: 15px; font-weight: 900; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .decision-card textarea { width: 100%; border-radius: 12px; border: 1px solid #cbd5e1; padding: 16px; font-size: 14px; outline: none; margin-bottom: 16px; font-family: inherit; }
        
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-obs { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-app { background: #00417B; color: white; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* Sidebar Right: History */
        .sidebar-right { background: white; border-radius: 20px; border: 1px solid var(--border-color); padding: 20px; }
        .history-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
        .history-item .h-date { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .history-item .h-status { font-size: 11px; font-weight: 900; display: inline-block; margin: 4px 0; }
        .history-item .h-comment { font-size: 12px; color: var(--text-muted); font-style: italic; }
        .st-APROBADO { color: #10b981; }
        .st-OBSERVADO { color: #ef4444; }
    </style>

    <div class="bandeja-layout">
        <aside class="sidebar-left">
            <h3>Áreas con Reportes</h3>
            <div id="areaList" class="area-list">
                <!-- Dinámico -->
            </div>
        </aside>

        <main class="main-content">
            <header class="header-premium">
                <h1>Bandeja de Revisión Consolidada</h1>
                <p id="selectedAreaTitle" style="margin: 8px 0 0; font-weight: 500; opacity: 0.9;">Seleccione un área para revisar sus formatos.</p>
            </header>

            <div id="reviewBody" style="display:none;">
                <nav class="tabs-nav">
                    <button class="tab-btn active" onclick="bandeja_switchTab('A')">F. Indicadores</button>
                    <button class="tab-btn" onclick="bandeja_switchTab('B')">F. Actividades</button>
                    <button class="tab-btn" onclick="bandeja_switchTab('C')">F. Riesgos</button>
                    <button class="tab-btn" onclick="bandeja_switchTab('D')">F. Capacitaciones</button>
                </nav>

                <div class="table-container">
                    <table class="data-table">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <section class="decision-card">
                    <h3><i class="fa-solid fa-comment-dots"></i> Evaluación de la Información</h3>
                    <textarea id="revComments" rows="3" placeholder="Escriba sus comentarios u observaciones..."></textarea>
                    <div class="btn-group">
                        <button class="btn-obs" onclick="bandeja_submit('OBSERVADO')">Observar</button>
                        <button class="btn-app" onclick="bandeja_submit('APROBADO')">Aprobar Todo</button>
                    </div>
                </section>
            </div>
        </main>

        <aside class="sidebar-right">
            <h3>Historial de Revisiones</h3>
            <div id="historyList">
                <p style="font-size:12px; color:#94a3b8; text-align:center; padding-top:20px;">Seleccione un área para ver su historial.</p>
            </div>
        </aside>
    </div>

    <script>
        let GLOBAL_DATA = null;
        let SELECTED_AREA = null;
        let ACTIVE_TAB = 'A';

        function bandeja_load() {
            google.script.run.withSuccessHandler(res => {
                GLOBAL_DATA = res;
                renderAreaList(res.areas);
                if(res.areas.length) bandeja_selectArea(res.areas[0]);
            }).bandeja_getInbox();
        }

        function renderAreaList(areas) {
            const list = document.getElementById('areaList');
            if(!areas.length) { list.innerHTML = '<p style="font-size:12px; color:#94a3b8;">No hay envíos pendientes.</p>'; return; }
            list.innerHTML = areas.map(a => `<div class="area-item" onclick="bandeja_selectArea('${a}')" id="area-${a.replace(/\s/g, '_')}">${a}</div>`).join('');
        }

        function bandeja_selectArea(area) {
            SELECTED_AREA = area;
            document.querySelectorAll('.area-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('area-' + area.replace(/\s/g, '_'));
            if(activeEl) activeEl.classList.add('active');

            document.getElementById('selectedAreaTitle').textContent = 'Revisando: ' + area;
            document.getElementById('reviewBody').style.display = 'block';
            
            bandeja_switchTab(ACTIVE_TAB);
            loadHistory(area);
        }

        function bandeja_switchTab(tab) {
            ACTIVE_TAB = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event?.target?.classList?.add('active');

            const items = GLOBAL_DATA.formatos[tab].filter(d => d.area === SELECTED_AREA);
            renderTable(tab, items);
        }

        function renderTable(tab, items) {
            const head = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            if (tab === 'A') {
                head.innerHTML = '<tr><th>Indicador</th><th>Meta/Avance</th><th>Estado</th></tr>';
                body.innerHTML = items.map(d => `<tr><td><b>${d.nombre}</b></td><td>${d.resultado}/${d.metaAnual} (${d.avance}%)</td><td>${d.estado}</td></tr>`).join('');
            } else if (tab === 'B') {
                head.innerHTML = '<tr><th>Actividad</th><th>Eje</th><th>Logro</th></tr>';
                body.innerHTML = items.map(d => `<tr><td><b>${d.titulo}</b><br>${d.fecha}</td><td>${d.eje}</td><td>${d.logro || '-'}</td></tr>`).join('');
            } else if (tab === 'C') {
                head.innerHTML = '<tr><th>Riesgo</th><th>Prioridad</th><th>Estado</th></tr>';
                body.innerHTML = items.map(d => `<tr><td><b>${d.riesgo}</b></td><td>${d.prioridad}</td><td>${d.estado}</td></tr>`).join('');
            } else if (tab === 'D') {
                head.innerHTML = '<tr><th>Capacitación</th><th>Modalidad</th><th>Estado</th></tr>';
                body.innerHTML = items.map(d => `<tr><td><b>${d.nombre}</b><br>${d.fecha}</td><td>${d.modalidad}</td><td>${d.estado}</td></tr>`).join('');
            }

            if(!items.length) body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:40px; color:#94a3b8;">No hay datos para este formato.</td></tr>';
        }

        function bandeja_submit(status) {
            const comments = document.getElementById('revComments').value;
            if(status === 'OBSERVADO' && !comments) {
                return Swal.fire('Atención', 'Debe ingresar un comentario para observar el reporte.', 'warning');
            }

            Swal.fire({
                title: `¿Confirmar ${status}?`,
                text: `Se notificará al área de ${SELECTED_AREA}.`,
                icon: 'question',
                showCancelButton: true
            }).then(res => {
                if(res.isConfirmed) {
                    Swal.fire({ title: 'Guardando revisión...', didOpen: () => Swal.showLoading() });
                    google.script.run.withSuccessHandler(resp => {
                        Swal.fire('Éxito', resp.message, 'success');
                        document.getElementById('revComments').value = '';
                        loadHistory(SELECTED_AREA);
                    }).bandeja_updateStatus(SELECTED_AREA, status, comments);
                }
            });
        }

        function loadHistory(area) {
            const list = document.getElementById('historyList');
            google.script.run.withSuccessHandler(logs => {
                if(!logs.length) { list.innerHTML = '<p style="font-size:12px; color:#94a3b8; text-align:center;">Sin revisiones previas.</p>'; return; }
                list.innerHTML = logs.map(l => `
                    <div class="history-item">
                        <div class="h-date">${new Date(l.timestamp).toLocaleString()}</div>
                        <div class="h-status st-${l.decision}">${l.decision}</div>
                        <div class="h-comment">${l.comentarios || 'Sin comentarios.'}</div>
                    </div>
                `).join('');
            }).bandeja_getHistory(area);
        }

        bandeja_load();
    </script>
</div>
