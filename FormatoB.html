<div id="formatoB_root">
  <style>
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
      padding: 40px;
      border-radius: 24px;
      color: white;
      box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
    }

    .grid-act {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 32px;
    }

    .card-act {
      background: white;
      border-radius: 28px;
      border: 1px solid #f1f5f9;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
    }

    .card-act:hover {
      transform: translateY(-8px);
      border-color: #00417B;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-body {
      padding: 24px;
    }

    .card-title {
      font-weight: 950;
      font-size: 20px;
      color: #1e293b;
      margin: 12px 0;
    }

    .custom-input,
    .custom-textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }
  </style>

  <div class="header-actions">
    <div>
      <h2 style="margin:0; font-size:32px;">Formato B: Actividades</h2>
      <p style="margin:8px 0 0; opacity:0.9;">Seguimiento del progreso institucional</p>
    </div>
    <button
      style="background:white; color:#00417B; border:none; padding:14px 24px; border-radius:12px; font-weight:900; cursor:pointer;"
      onclick="modalActividad()">
      + Agregar Actividad
    </button>
  </div>

  <div id="gridAct" class="grid-act"></div>

  <script>
    let CACHE_ACTS = [];

    function formatoB_load() {
      google.script.run.withSuccessHandler(data => {
        CACHE_ACTS = data;
        renderAct(data);
      }).formatoB_get();
    }

    function renderAct(items) {
      const grid = document.getElementById('gridAct');
      if (!items.length) { grid.innerHTML = '<div style="padding:40px; text-align:center;">No hay actividades.</div>'; return; }

      grid.innerHTML = items.map(a => `
            <div class="card-act">
                <div style="position:relative;">
                    <img src="${a.imagen}" class="card-img">
                    <span style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.9); padding:6px 14px; border-radius:20px; font-size:10px; font-weight:900;">${a.estado}</span>
                </div>
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:11px; font-weight:900; color:#00417B;">${a.tipo}</span>
                        <button style="background:#f1f5f9; border:none; padding:6px 12px; border-radius:8px; font-size:11px; font-weight:900; cursor:pointer;" onclick="modalActividad('${a.id}')">EDITAR</button>
                    </div>
                    <h3 class="card-title">${a.titulo}</h3>
                    <p style="font-size:13px; color:#64748b; margin-bottom:16px;">${a.descripcion}</p>
                    <div style="background:#f8fafc; padding:12px; border-radius:12px; font-size:12px; color:#475569;">
                        <strong>Impacto:</strong> ${a.impacto}
                    </div>
                </div>
            </div>`).join('');
    }

    function modalActividad(id = null) {
      const data = id ? CACHE_ACTS.find(x => x.id === id) : null;
      Swal.fire({
        title: data ? 'Editar Actividad' : 'Nueva Actividad',
        html: `
                    <div style="text-align:left;">
                        <input type="hidden" id="fB_id" value="${data ? data.id : ''}">
                        <label style="font-size:12px; font-weight:800;">Título</label>
                        <input id="fB_titulo" class="custom-input" value="${data ? data.titulo : ''}">
                        
                        <label style="font-size:12px; font-weight:800;">Descripción</label>
                        <textarea id="fB_desc" class="custom-textarea">${data ? data.descripcion : ''}</textarea>
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div>
                                <label style="font-size:12px; font-weight:800;">Categoría</label>
                                <select id="fB_tipo" class="custom-input">
                                    <option ${data?.tipo == 'Estratégico' ? 'selected' : ''}>Estratégico</option>
                                    <option ${data?.tipo == 'Soporte' ? 'selected' : ''}>Soporte</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size:12px; font-weight:800;">Estado</label>
                                <select id="fB_estado" class="custom-input">
                                    <option ${data?.estado == 'EN PROGRESO' ? 'selected' : ''}>EN PROGRESO</option>
                                    <option ${data?.estado == 'COMPLETADO' ? 'selected' : ''}>COMPLETADO</option>
                                </select>
                            </div>
                        </div>
                        <label style="font-size:12px; font-weight:800;">Impacto</label>
                        <input id="fB_impacto" class="custom-input" value="${data ? data.impacto : ''}">
                    </div>
                `,
        showCancelButton: true,
        confirmButtonColor: '#00417B',
        confirmButtonText: 'Guardar',
        preConfirm: () => ({
          id: document.getElementById('fB_id').value,
          titulo: document.getElementById('fB_titulo').value,
          descripcion: document.getElementById('fB_desc').value,
          tipo: document.getElementById('fB_tipo').value,
          estado: document.getElementById('fB_estado').value,
          impacto: document.getElementById('fB_impacto').value
        })
      }).then(r => {
        if (r.isConfirmed) {
          Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
          google.script.run.withSuccessHandler(res => {
            if (res.success) { Swal.fire({ icon: 'success', title: 'Guardado', timer: 1500 }); formatoB_load(); }
            else Swal.fire('Error', res.message, 'error');
          }).formatoB_save(r.value);
        }
      });
    }
    formatoB_load();
  </script>
</div>
