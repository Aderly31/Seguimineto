<div class="mod-container">
  <div class="mod-hero">
    <div class="mod-hero-content">
      <h1 class="mod-title"><i class="fa-solid fa-chart-simple"></i> Indicadores</h1>
      <p class="mod-subtitle">Gestión de indicadores de gestión</p>
    </div>
    <div class="mod-hero-actions">
      <div class="mod-search">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="indicadoresSearch" placeholder="Buscar indicador..." oninput="indicadores_filterTable()">
      </div>
      <span class="mod-count" id="indicadoresCount">0 registros</span>
    </div>
  </div>

  <div class="mod-card">
    <div class="mod-table-wrapper">
      <table class="mod-table" id="indicadoresTable">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Área</th>
            <th>Código AEI</th>
            <th>Meta Anual</th>
            <th>Resultado Semestre</th>
            <th>Avance</th>
            <th>Estado</th>
            <th>Responsable</th>
            <th>Fuente</th>
          </tr>
        </thead>
        <tbody id="indicadoresBody"></tbody>
      </table>
    </div>
    <div class="mod-empty" id="indicadoresEmpty">
      <i class="fa-solid fa-chart-simple"></i>
      <p>No hay indicadores registrados</p>
    </div>
  </div>
</div>



<script>
  window.indicadores_init = function() {
    loadIndicadores();
  };

  function loadIndicadores() {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          window._indicadoresData = res.data || [];
          indicadores_renderTable(window._indicadoresData);
        } else {
          ui_showError("Error al cargar indicadores");
        }
      })
      .withFailureHandler(err => {
        console.error("Error Indicadores:", err);
        ui_showError("Error al cargar indicadores");
      })
      .indicadores_list();
  }

  window.indicadores_renderTable = function(data) {
    const tbody = document.getElementById('indicadoresBody');
    const empty = document.getElementById('indicadoresEmpty');
    const count = document.getElementById('indicadoresCount');

    count.textContent = data.length + ' registros';

    if (!data.length) {
      tbody.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    tbody.innerHTML = data.map(r => {
      const avance = parseFloat(r.avance) || 0;
      const pct = Math.min(Math.max(avance, 0), 100);
      const barColor = pct >= 80 ? '#22c55e' : pct >= 50 ? '#eab308' : '#ef4444';
      const estadoClass = {
        'completado': 'badge-ok', 'completo': 'badge-ok', 'ok': 'badge-ok',
        'en proceso': 'badge-warn', 'proceso': 'badge-warn', 'pendiente': 'badge-warn',
        'no iniciado': 'badge-err'
      }[String(r.estado || '').toLowerCase().trim()] || 'badge-info';

      return `<tr>
        <td><strong>${esc(r.nombre || '')}</strong></td>
        <td>${esc(r.area || '')}</td>
        <td><span class="badge badge-neutral">${esc(r.codAei || r.codaei || '')}</span></td>
        <td>${esc(r.metaAnual || r.metaanual || '')}</td>
        <td>${esc(r.resultadoSemestre || r.resultadosemestre || '')}</td>
        <td>
          <div class="progress-bar">
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%;background:${barColor}"></div>
            </div>
            <span class="progress-label" style="color:${barColor}">${pct}%</span>
          </div>
        </td>
        <td><span class="badge ${estadoClass}">${esc(r.estado || '')}</span></td>
        <td>${esc(r.responsable || '')}</td>
        <td>${esc(r.fuente || '')}</td>
      </tr>`;
    }).join('');
  };

  window.indicadores_filterTable = function() {
    const q = document.getElementById('indicadoresSearch').value.toLowerCase().trim();
    const data = window._indicadoresData || [];
    if (!q) return indicadores_renderTable(data);
    const filtered = data.filter(r =>
      String(r.nombre || '').toLowerCase().includes(q) ||
      String(r.area || '').toLowerCase().includes(q) ||
      String(r.responsable || '').toLowerCase().includes(q) ||
      String(r.codAei || r.codaei || '').toLowerCase().includes(q)
    );
    indicadores_renderTable(filtered);
  };


</script>
