<div id="formatoA_root">
    <style>
        :root {
            --glow-primary: #00417B;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        #formatoA_root {
            animation: slideUpFade 0.6s ease;
            padding-bottom: 40px;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
            padding: 40px;
            border-radius: 24px;
            color: white;
            box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
        }

        .view-title h1 {
            font-size: 32px;
            font-weight: 950;
            margin: 0;
            letter-spacing: -1.5px;
        }

        .view-title p {
            color: rgba(255, 255, 255, 0.9);
            margin: 8px 0 0;
            font-weight: 500;
            font-size: 16px;
        }

        .btn-primary {
            background: white;
            color: #00417B;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.15);
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .card-premium {
            background: white;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-premium:hover {
            transform: translateY(-8px);
            border-color: #00417B;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .card-banner {
            width: 100%;
            height: 160px;
            position: relative;
            background: #f1f5f9;
        }

        .card-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 950;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
        }

        .badge-category {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            background: rgba(0, 65, 123, 0.9);
            color: white;
        }

        .card-body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .btn-edit-sm {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }

        .btn-edit-sm:hover {
            background: #00417B;
            color: white;
            border-color: #00417B;
        }

        .card-title {
            font-size: 20px;
            font-weight: 950;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .card-detail-box {
            background: rgba(0, 65, 123, 0.03);
            border: 1px solid rgba(0, 65, 123, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-top: auto;
        }

        /* Formulario oculto */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-card {
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            background: #fcfcfd;
            font-size: 14px;
        }
    </style>

    <!-- VISTA LISTADO -->
    <div id="formatoA_list">
        <header class="view-header">
            <div class="view-title">
                <h1>Formato A: Indicadores</h1>
                <p>Captura y monitoreo de datos institucionales semestrales</p>
            </div>
            <button class="btn-primary" onclick="formatoA_openForm()">
                <i class="fa-solid fa-plus"></i> Agregar Indicador
            </button>
        </header>
        <div id="formatoA_grid" class="grid-cards"></div>
    </div>

    <!-- VISTA FORMULARIO (Oculta por defecto) -->
    <div id="formatoA_form" style="display: none;">
        <header class="view-header">
            <div class="view-title">
                <h1 id="formTitleA">Nuevo Indicador</h1>
                <p>Complete los datos para guardar el registro</p>
            </div>
        </header>

        <form id="formA_main" onsubmit="formatoA_save(event)">
            <input type="hidden" id="fA_id">
            <div class="form-grid">
                <div class="form-card">
                    <div class="form-group"><label>Nombre del Indicador *</label><input type="text" id="fA_nombre"
                            required></div>
                    <div class="form-group"><label>Responsable *</label><input type="text" id="fA_responsable" required>
                    </div>
                    <div class="form-group"><label>Fuente de Datos</label>
                        <select id="fA_fuente">
                            <option value="SGA">SGA</option>
                            <option value="ERP">ERP Financiero</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>
                </div>
                <div class="form-card">
                    <div class="form-group"><label>Meta Anual *</label><input type="number" step="0.01" id="fA_meta"
                            required></div>
                    <div class="form-group"><label>Resultado Semestre *</label><input type="number" step="0.01"
                            id="fA_resultado" required></div>
                    <div class="form-group"><label>Enlace de Evidencia</label><input type="url" id="fA_enlace"
                            placeholder="https://..."></div>
                </div>
            </div>
            <div style="display:flex; gap:16px; justify-content:flex-end;">
                <button type="button" class="btn-primary" style="background:#f1f5f9; color:#64748b;"
                    onclick="formatoA_closeForm()">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar Registro</button>
            </div>
        </form>
    </div>

    <script>
        let CACHE_IND = [];

        function formatoA_load() {
            google.script.run.withSuccessHandler(data => {
                CACHE_IND = data;
                renderIndicadores(data);
            }).formatoA_get();
        }

        function renderIndicadores(items) {
            const grid = document.getElementById('formatoA_grid');
            if (!items.length) { grid.innerHTML = '<div style="padding:40px; text-align:center; width:100%;">No hay datos.</div>'; return; }

            grid.innerHTML = items.map(it => {
                const avanceCol = it.avance >= 90 ? '#10b981' : (it.avance >= 50 ? '#00417B' : '#f59e0b');
                return `
                <div class="card-premium">
                    <div class="card-banner">
                        <img src="https://images.unsplash.com/photo-1541339907198-e08756ebafe3?q=80&w=600" alt="Banner">
                        <div class="badge-status">${it.estado}</div>
                        <div class="badge-category">${it.fuente || 'Manual'}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-header-row">
                            <span style="font-size:11px; font-weight:900; color:#94a3b8;">INDICADOR</span>
                            <button class="btn-edit-sm" onclick="formatoA_edit('${it.id}')">EDITAR</button>
                        </div>
                        <h3 class="card-title">${it.nombre}</h3>
                        <div class="card-detail-box">
                            <div style="margin-bottom:8px;">Meta: <strong>${it.metaAnual}</strong> | Result: <strong>${it.resultado}</strong></div>
                            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:900; margin-bottom:6px;">
                                <span>AVANCE</span><span>${it.avance}%</span>
                            </div>
                            <div style="height:8px; background:#f1f5f9; border-radius:999px; overflow:hidden;">
                                <div style="height:100%; width:${it.avance}%; background:${avanceCol};"></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function formatoA_openForm() {
            document.getElementById('formatoA_list').style.display = 'none';
            document.getElementById('formatoA_form').style.display = 'block';
            document.getElementById('formTitleA').textContent = 'Nuevo Indicador';
            document.getElementById('formA_main').reset();
            document.getElementById('fA_id').value = '';
        }

        function formatoA_closeForm() {
            document.getElementById('formatoA_list').style.display = 'block';
            document.getElementById('formatoA_form').style.display = 'none';
        }

        function formatoA_edit(id) {
            const item = CACHE_IND.find(x => x.id === id);
            if (!item) return;
            formatoA_openForm();
            document.getElementById('formTitleA').textContent = 'Editar Indicador';
            document.getElementById('fA_id').value = item.id;
            document.getElementById('fA_nombre').value = item.nombre;
            document.getElementById('fA_responsable').value = item.responsable;
            document.getElementById('fA_fuente').value = item.fuente;
            document.getElementById('fA_meta').value = item.metaAnual;
            document.getElementById('fA_resultado').value = item.resultado;
            document.getElementById('fA_enlace').value = item.enlace;
        }

        function formatoA_save(e) {
            e.preventDefault();
            const data = {
                id: document.getElementById('fA_id').value,
                nombre: document.getElementById('fA_nombre').value,
                responsable: document.getElementById('fA_responsable').value,
                fuente: document.getElementById('fA_fuente').value,
                metaAnual: Number(document.getElementById('fA_meta').value),
                resultado: Number(document.getElementById('fA_resultado').value),
                enlace: document.getElementById('fA_enlace').value
            };
            Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    Swal.fire({ icon: 'success', title: 'Guardado', timer: 1500, showConfirmButton: false });
                    formatoA_closeForm();
                    formatoA_load();
                } else { Swal.fire('Error', res.message, 'error'); }
            }).formatoA_save(data);
        }

        formatoA_load();
    </script>
</div>
