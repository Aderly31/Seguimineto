<div id="formatoa_root">
    <style>
        .fa-container { animation: fadeIn 0.4s ease; }
        .fa-header { 
            background: linear-gradient(135deg, var(--c-primary) 0%, #002d56 100%);
            padding: 32px; border-radius: 24px; color: white; margin-bottom: 32px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,65,123,0.15);
        }
        .fa-header h1 { font-size: 26px; font-weight: 950; margin: 0; letter-spacing: -1.5px; }
        .fa-header p { margin: 4px 0 0; opacity: 0.9; font-size: 14px; font-weight: 500; }

        .fa-card { background: white; border-radius: 24px; border: 1px solid var(--line); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .fa-table th { background: #f8fafc; padding: 16px; text-align: left; font-weight: 900; color: #475569; border-bottom: 1px solid var(--line); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .fa-table td { padding: 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        .prog-bar { height: 8px; background: #f1f5f9; border-radius: 999px; overflow: hidden; margin-top: 6px; width: 120px; }
        .prog-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }

        .fa-form-card { max-width: 850px; margin: 0 auto; background: white; border-radius: 32px; border: 1px solid var(--line); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .fa-form-header { padding: 32px 40px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 20px; background: #fcfcfd; border-radius: 32px 32px 0 0; }
        .fa-form-body { padding: 40px; }
        .fa-form-footer { padding: 24px 40px; background: #f8fafc; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 16px; border-radius: 0 0 32px 32px; }
        
        .field-label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .field-input { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 14px; transition: all 0.2s; outline: none; background: #fff; }
        .field-input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 4px rgba(0,65,123,0.1); background: #fff; }
        
        .btn-plus { background: white; color: var(--c-primary); border: none; padding: 12px 20px; border-radius: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-plus:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>

    <div class="fa-container">
        <!-- List View -->
        <div id="fa_list_view">
            <header class="fa-header">
                <div>
                    <h1>Formato A: Indicadores</h1>
                    <p>Monitoreo semestral de metas institucionales</p>
                </div>
                <button class="btn-plus" onclick="FormatoAModule.openForm()">
                    <i class="fa-solid fa-circle-plus"></i> Nuevo Indicador
                </button>
            </header>

            <div class="fa-card">
                <div class="fa-table-wrap">
                    <table class="fa-table">
                        <thead>
                            <tr>
                                <th>Indicador / Responsable</th>
                                <th>Meta Anual</th>
                                <th>Resultado</th>
                                <th>Avance</th>
                                <th>Estado</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="fa_table_body">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Form View -->
        <div id="fa_form_view" style="display:none;">
            <div class="fa-form-card">
                <div class="fa-form-header">
                    <div style="background:var(--c-primary); color:white; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div>
                        <h2 id="fa_form_title" style="margin:0; font-size:18px; font-weight:950;">Registro de Indicador</h2>
                        <p style="margin:2px 0 0; font-size:12px; color:var(--muted);">Complete los campos para el reporte semestral</p>
                    </div>
                </div>

                <form id="fa_form_element" onsubmit="FormatoAModule.save(event)">
                    <input type="hidden" id="fa_id">
                    <div class="fa-form-body">
                        <div class="form-grid">
                            <div class="form-col-full">
                                <label class="field-label">Nombre del Indicador *</label>
                                <input type="text" id="fa_nombre" class="field-input" required placeholder="Ej: Tasa de retención estudiantil">
                            </div>
                            
                            <div>
                                <label class="field-label">Área *</label>
                                <select id="fa_area" class="field-input" required onchange="FormatoAModule.handleAreaChange(this.value)">
                                    <option value="">Seleccione área...</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="field-label">Acción PEI (AEI) *</label>
                                <select id="fa_aei" class="field-input" required>
                                    <option value="">Seleccione AEI...</option>
                                </select>
                            </div>

                            <div>
                                <label class="field-label">Meta Anual *</label>
                                <input type="number" step="0.01" id="fa_meta" class="field-input" required placeholder="0.00">
                            </div>
                            
                            <div>
                                <label class="field-label">Resultado Semestral *</label>
                                <input type="number" step="0.01" id="fa_resultado" class="field-input" required placeholder="0.00">
                            </div>

                            <div>
                                <label class="field-label">Fuente de Información</label>
                                <input type="text" id="fa_fuente" class="field-input" placeholder="Ej: Sistema Académico">
                            </div>

                            <div>
                                <label class="field-label">Enlace de Evidencia (URL)</label>
                                <input type="url" id="fa_enlace" class="field-input" placeholder="https://...">
                            </div>
                        </div>
                    </div>

                    <div class="fa-form-footer">
                        <button type="button" class="btn-obs" onclick="FormatoAModule.closeForm()">Cancelar</button>
                        <button type="submit" class="btn-app">Guardar Indicador</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        /**
         * FormatoAModule (Core v2 Modular)
         */
        window.FormatoAModule = (() => {
            const state = {
                data: [],
                areas: []
            };

            const init = () => {
                load();
            };

            const load = () => {
                ui_showLoading("Cargando indicadores...");
                google.script.run.withSuccessHandler(res => {
                    state.areas = res.areas;
                    renderSelectAreas(res.areas);
                    
                    google.script.run.withSuccessHandler(data => {
                        ui_hideLoading();
                        state.data = data;
                        renderTable(data);
                    }).formatoA_get();
                }).common_getAppData();
            };

            const renderSelectAreas = (areas) => {
                const sel = document.getElementById('fa_area');
                if(!sel) return;
                sel.innerHTML = '<option value="">Seleccione área...</option>' + 
                    areas.map(a => `<option value="${a.id}">${a.label}</option>`).join('');
            };

            const handleAreaChange = (areaId) => {
                const sel = document.getElementById('fa_aei');
                sel.innerHTML = '<option value="">Cargando vinculación...</option>';
                google.script.run.withSuccessHandler(aeis => {
                    if(!aeis || !aeis.length) {
                        sel.innerHTML = '<option value="">Sin vinculación PEI</option>';
                    } else {
                        sel.innerHTML = '<option value="">Seleccione AEI...</option>' + 
                            aeis.map(a => `<option value="${a.codAei}">[${a.codAei}] ${a.accion}</option>`).join('');
                    }
                }).common_getVinculacion(areaId);
            };

            const renderTable = (items) => {
                const tbody = document.getElementById('fa_table_body');
                if(!items.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center p-10 text-muted">No hay indicadores registrados.</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(it => {
                    const color = it.avance >= 90 ? '#10b981' : (it.avance >= 50 ? '#00417B' : '#f59e0b');
                    let badgeClass = 'badge-primary';
                    if(it.estado === 'Borrador') badgeClass = 'badge-obs';
                    if(it.estado === 'Enviado') badgeClass = 'badge-success';

                    return `
                        <tr>
                            <td>
                                <div class="font-black text-slate-800">${it.nombre}</div>
                                <div class="text-[11px] text-muted font-bold">${it.responsable || 'Sin responsable'}</div>
                            </td>
                            <td class="font-bold text-slate-700">${it.metaAnual}</td>
                            <td class="font-bold text-slate-700">${it.resultado}</td>
                            <td>
                                <div class="flex flex-col">
                                    <span class="text-[10px] font-black text-slate-500">${it.avance}%</span>
                                    <div class="prog-bar">
                                        <div class="prog-fill" style="width:${it.avance}%; background:${color}"></div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge ${badgeClass}">${it.estado}</span></td>
                            <td class="text-right">
                                <div class="flex justify-end gap-2">
                                    <button class="btn-icon" onclick="FormatoAModule.edit('${it.id}')" title="Editar">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </button>
                                    ${it.enlace ? `<a href="${it.enlace}" target="_blank" class="btn-icon" style="color:var(--c-primary)"><i class="fa-solid fa-link"></i></a>` : ''}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            };

            const openForm = () => {
                document.getElementById('fa_list_view').style.display = 'none';
                document.getElementById('fa_form_view').style.display = 'block';
                document.getElementById('fa_form_element').reset();
                document.getElementById('fa_id').value = '';
                document.getElementById('fa_form_title').textContent = 'Nuevo Indicador';
            };

            const closeForm = () => {
                document.getElementById('fa_list_view').style.display = 'block';
                document.getElementById('fa_form_view').style.display = 'none';
            };

            const edit = (id) => {
                const it = state.data.find(x => x.id === id);
                if(!it) return;
                
                openForm();
                document.getElementById('fa_form_title').textContent = 'Editar Indicador';
                document.getElementById('fa_id').value = it.id;
                document.getElementById('fa_nombre').value = it.nombre;
                document.getElementById('fa_area').value = it.area;
                document.getElementById('fa_meta').value = it.metaAnual;
                document.getElementById('fa_resultado').value = it.resultado;
                document.getElementById('fa_fuente').value = it.fuente;
                document.getElementById('fa_enlace').value = it.enlace;
                
                handleAreaChange(it.area);
                setTimeout(() => { document.getElementById('fa_aei').value = it.codAei; }, 800);
            };

            const save = (e) => {
                e.preventDefault();
                const data = {
                    id: document.getElementById('fa_id').value,
                    nombre: document.getElementById('fa_nombre').value,
                    area: document.getElementById('fa_area').value,
                    codAei: document.getElementById('fa_aei').value,
                    metaAnual: Number(document.getElementById('fa_meta').value),
                    resultado: Number(document.getElementById('fa_resultado').value),
                    fuente: document.getElementById('fa_fuente').value,
                    enlace: document.getElementById('fa_enlace').value
                };

                ui_showLoading("Guardando indicador...");
                google.script.run.withSuccessHandler(res => {
                    ui_hideLoading();
                    if(res.success) {
                        Swal.fire('Éxito', 'Indicador guardado correctamente', 'success');
                        closeForm();
                        load();
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                }).formatoA_save(data);
            };

            return { init, openForm, closeForm, edit, save, handleAreaChange };
        })();
    </script>
</div>
