<div id="vinculacionpei_root">
    <style>
        .vp-container { animation: fadeIn 0.4s ease; }
        
        /* Banner Header */
        .vp-header { 
            background: linear-gradient(135deg, var(--c-primary) 0%, #002d56 100%);
            padding: 32px; border-radius: 24px; color: white; margin-bottom: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
        }
        .vp-header h1 { font-size: 28px; font-weight: 950; margin: 0; letter-spacing: -1px; }
        .vp-header p { margin: 6px 0 0; opacity: 0.9; font-size: 14px; }

        /* Split Layout */
        .vp-layout { display: grid; grid-template-columns: 320px 1fr; gap: 32px; align-items: start; }

        /* Sidebar Areas */
        .vp-sidebar { background: white; border: 1px solid var(--line); border-radius: 24px; padding: 24px; position: sticky; top: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .vp-sidebar h3 { font-size: 13px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .vp-area-list { display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; padding-right: 8px; }
        .vp-area-list::-webkit-scrollbar { width: 5px; }
        .vp-area-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .vp-area-item { 
            padding: 14px 18px; border-radius: 14px; font-size: 13px; font-weight: 800; color: #475569; 
            cursor: pointer; transition: all 0.2s; border: 1px solid transparent; background: #f8fafc;
        }
        .vp-area-item:hover { background: white; border-color: #cbd5e1; color: var(--c-primary); transform: translateX(5px); }
        .vp-area-item.active { background: #eff6ff; color: var(--c-primary); border-color: var(--c-primary); box-shadow: 0 4px 12px rgba(0,65,123,0.08); }

        /* AEI Selection Area */
        .vp-main { background: white; border: 1px solid var(--line); border-radius: 28px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); min-height: 500px; }
        .vp-empty { text-align: center; padding: 80px 20px; color: #94a3b8; }
        .vp-empty i { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
        
        .vp-editor-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        .vp-editor-header h2 { margin: 0; font-size: 22px; font-weight: 950; color: #0f172a; letter-spacing: -0.5px; }

        .vp-aei-grid { display: grid; gap: 16px; }
        .vp-aei-card { 
            display: flex; gap: 16px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 18px; 
            cursor: pointer; transition: all 0.2s; background: #fcfcfd; position: relative;
        }
        .vp-aei-card:hover { border-color: var(--c-primary); background: white; box-shadow: 0 10px 20px rgba(0,65,123,0.05); }
        .vp-aei-card.selected { border-color: var(--c-primary); background: #eff6ff; }
        
        .vp-aei-card input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--c-primary); margin-top: 2px; }
        .vp-aei-info { flex: 1; }
        .vp-aei-code { font-size: 10px; font-weight: 950; color: white; background: #0f172a; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 8px; }
        .vp-aei-text { font-size: 14px; font-weight: 800; color: #1e293b; margin-bottom: 10px; line-height: 1.5; }
        .vp-aei-ind { font-size: 12px; font-weight: 700; color: #64748b; background: #f1f5f9; padding: 8px 12px; border-radius: 10px; border: 1px solid #e2e8f0; }

        .vp-footer { margin-top: 40px; padding-top: 24px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; position: sticky; bottom: 0; background: white; z-index: 10; padding-bottom: 20px; }
    </style>

    <div class="vp-container">
        <header class="vp-header">
            <h1>Vinculación Área - Plan Estratégico</h1>
            <p>Relacione las unidades académicas y administrativas con sus respectivas acciones del PEI.</p>
        </header>

        <div class="vp-layout">
            <aside class="vp-sidebar">
                <h3><i class="fa-solid fa-sitemap"></i> Directorio de Áreas</h3>
                <div id="vp_area_list" class="vp-area-list">
                    <!-- Dinámico -->
                    <div style="padding:20px; text-align:center; color:#94a3b8; font-size:12px;"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>
                </div>
            </aside>

            <main class="vp-main">
                <div id="vp_empty" class="vp-empty">
                    <i class="fa-solid fa-hand-pointer"></i>
                    <p>Seleccione una unidad del panel izquierdo para gestionar su vinculación PEI.</p>
                </div>

                <div id="vp_editor" style="display: none;">
                    <div class="vp-editor-header">
                        <h2 id="vp_editor_title">Unidad Seleccionada</h2>
                        <span class="badge-status" id="vp_counter" style="background:#f1f5f9; color:#475569;">0 Vinculadas</span>
                    </div>
                    
                    <div id="vp_aei_list" class="vp-aei-grid">
                        <!-- Dinámico -->
                    </div>
                    
                    <div class="vp-footer">
                        <button id="vp_save_btn" class="btn-app" onclick="vp_save()">
                            <i class="fa-solid fa-floppy-disk mr-2"></i> Guardar Vinculación
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        /**
         * Lógica del Módulo: Vinculación PEI
         */
        window.VP_STATE = {
            areas: [],
            pei: [],
            vinculaciones: [],
            selectedArea: null
        };

        function vinculacionpei_init() {
            vp_load();
        }

        function vp_load() {
            ui_showLoading("Cargando matriz de vinculación...");
            google.script.run.withSuccessHandler(res => {
                ui_hideLoading();
                window.VP_STATE = { ...window.VP_STATE, ...res };
                vp_renderAreas(res.areas);
            }).vinculacion_getData();
        }

        function vp_renderAreas(areas) {
            const list = document.getElementById('vp_area_list');
            list.innerHTML = areas.map(a => `
                <div class="vp-area-item" onclick="vp_selectArea('${a.id}', this)">
                    ${a.label}
                </div>
            `).join('');
        }

        function vp_selectArea(id, el) {
            document.querySelectorAll('.vp-area-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            
            window.VP_STATE.selectedArea = id;
            document.getElementById('vp_empty').style.display = 'none';
            document.getElementById('vp_editor').style.display = 'block';
            document.getElementById('vp_editor_title').textContent = el.textContent.trim();

            vp_renderPEI();
        }

        function vp_renderPEI() {
            const container = document.getElementById('vp_aei_list');
            const currentV = window.VP_STATE.vinculaciones
                .filter(v => v.areaId === String(window.VP_STATE.selectedArea).toLowerCase())
                .map(v => String(v.aeiCode).toLowerCase());

            container.innerHTML = window.VP_STATE.pei.map(aei => {
                const isChecked = currentV.includes(String(aei.codAei).toLowerCase());
                return `
                    <label class="vp-aei-card ${isChecked ? 'selected' : ''}" onclick="vp_toggleCard(this)">
                        <input type="checkbox" name="vp_aei_check" value="${aei.codAei}" ${isChecked ? 'checked' : ''} onchange="vp_updateCount()">
                        <div class="vp-aei-info">
                            <span class="vp-aei-code">${aei.codAei}</span>
                            <div class="vp-aei-text">${aei.accion}</div>
                            ${aei.indicador ? `<div class="vp-aei-ind"><i class="fa-solid fa-chart-line mr-2"></i><b>Indicador:</b> ${aei.indicador}</div>` : ''}
                        </div>
                    </label>
                `;
            }).join('');
            vp_updateCount();
        }

        function vp_toggleCard(label) {
            setTimeout(() => {
                const chk = label.querySelector('input');
                if(chk.checked) label.classList.add('selected');
                else label.classList.remove('selected');
            }, 50);
        }

        function vp_updateCount() {
            const count = document.querySelectorAll('input[name="vp_aei_check"]:checked').length;
            document.getElementById('vp_counter').textContent = `${count} Acciones Vinculadas`;
        }

        function vp_save() {
            const checks = document.querySelectorAll('input[name="vp_aei_check"]:checked');
            const codes = Array.from(checks).map(c => c.value);

            ui_showLoading("Actualizando vinculación...");
            google.script.run.withSuccessHandler(res => {
                ui_hideLoading();
                if (res.success) {
                    Swal.fire('¡Éxito!', 'Vinculación actualizada correctamente', 'success');
                    // Sync local state
                    window.VP_STATE.vinculaciones = window.VP_STATE.vinculaciones.filter(v => v.areaId !== String(window.VP_STATE.selectedArea).toLowerCase());
                    codes.forEach(c => window.VP_STATE.vinculaciones.push({ areaId: String(window.VP_STATE.selectedArea).toLowerCase(), aeiCode: String(c).toLowerCase() }));
                }
            }).vinculacion_save(window.VP_STATE.selectedArea, codes);
        }
    </script>
</div>
