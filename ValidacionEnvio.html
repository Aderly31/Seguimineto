<div id="validacion_root">
    <style>
        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
            padding: 40px;
            border-radius: 24px;
            color: white;
            box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
        }

        .val-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .val-card.ok {
            border-left: 6px solid #10b981;
        }

        .val-card.warn {
            border-left: 6px solid #f59e0b;
        }

        .btn-submit-final {
            background: #00417B;
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-weight: 950;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            box-shadow: 0 10px 20px -5px rgba(0, 65, 123, 0.3);
        }

        .btn-submit-final:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(0, 65, 123, 0.4);
        }
    </style>

    <header class="view-header">
        <div>
            <h1 style="margin:0; font-size:32px; font-weight:950;">Validación de Envío</h1>
            <p style="margin:8px 0 0; opacity:0.9;">Revisa que todos tus formatos estén completos antes de enviar a
                Planificación.</p>
        </div>
    </header>

    <div id="valContent">Cargando validaciones...</div>

    <script>
        function loadValidacion() {
            google.script.run.withSuccessHandler(data => {
                const list = document.getElementById('valContent');
                let html = data.map(f => `
                    <div class="val-card ${f.listo ? 'ok' : 'warn'}">
                        <div>
                            <h3 style="margin:0 0 8px; font-size:18px; color:#1e293b;">${f.titulo}</h3>
                            <span style="font-size:13px; font-weight:800; color:${f.listo ? '#10b981' : '#f59e0b'};">
                                ${f.listo ? '<i class="fa-solid fa-check"></i> Completo' : '<i class="fa-solid fa-triangle-exclamation"></i> Faltan registros'}
                            </span>
                        </div>
                        <div style="font-size:14px; font-weight:900; color:#64748b;">${f.cantidad} Registros</div>
                    </div>
                `).join('');

                const todoListo = data.every(d => d.listo);
                html += `
                    <div style="margin-top:40px; background:#f8fafc; padding:32px; border-radius:24px; border:1px solid #e2e8f0; text-align:center;">
                        <h2 style="margin:0 0 16px; color:#1e293b;">Confirmación Final</h2>
                        <p style="margin:0 0 24px; color:#64748b;">Al confirmar, tus datos pasarán a la bandeja de revisión y no podrás editarlos.</p>
                        <button class="btn-submit-final" onclick="submitFinal()" ${!todoListo ? 'disabled style="background:#cbd5e1; cursor:not-allowed;"' : ''}>
                            <i class="fa-solid fa-paper-plane"></i> Enviar a Planificación
                        </button>
                    </div>
                `;
                list.innerHTML = html;
            }).validacion_get();
        }

        function submitFinal() {
            Swal.fire({
                title: '¿Confirmar envío?',
                icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí, Enviar'
            }).then(r => {
                if (r.isConfirmed) {
                    Swal.fire({ title: 'Enviando...', didOpen: () => Swal.showLoading() });
                    google.script.run.withSuccessHandler(res => {
                        Swal.fire('Éxito', res.message, 'success');
                    }).validacion_submit();
                }
            });
        }
        loadValidacion();
    </script>
</div>
