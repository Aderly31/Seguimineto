<div class="mod-container">
  <div class="mod-hero">
    <div class="mod-hero-content">
      <h1 class="mod-title"><i class="fa-solid fa-chalkboard-user"></i> Capacitaciones</h1>
      <p class="mod-subtitle">Registro de capacitaciones y progreso de evidencias</p>
    </div>
    <div class="mod-hero-actions">
      <div class="mod-search">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="capacitacionesSearch" placeholder="Buscar capacitación..." oninput="capacitaciones_filterTable()">
      </div>
      <span class="mod-count" id="capacitacionesCount">0 registros</span>
    </div>
  </div>

  <div class="mod-card">
    <div class="mod-table-wrapper">
      <table class="mod-table" id="capacitacionesTable">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Área</th>
            <th>Código AEI</th>
            <th>Fecha</th>
            <th>Modalidad</th>
            <th>Participantes</th>
            <th>Progreso Evidencia</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="capacitacionesBody"></tbody>
      </table>
    </div>
    <div class="mod-empty" id="capacitacionesEmpty">
      <i class="fa-solid fa-chalkboard-user"></i>
      <p>No hay capacitaciones registradas</p>
    </div>
  </div>
</div>



<script>
  window.capacitaciones_init = function() {
    loadCapacitaciones();
  };

  function loadCapacitaciones() {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          window._capacitacionesData = res.data || [];
          capacitaciones_renderTable(window._capacitacionesData);
        } else {
          ui_showError("Error al cargar capacitaciones");
        }
      })
      .withFailureHandler(err => {
        console.error("Error Capacitaciones:", err);
        ui_showError("Error al cargar capacitaciones");
      })
      .capacitaciones_list();
  }

  window.capacitaciones_renderTable = function(data) {
    const tbody = document.getElementById('capacitacionesBody');
    const empty = document.getElementById('capacitacionesEmpty');
    const count = document.getElementById('capacitacionesCount');

    count.textContent = data.length + ' registros';

    if (!data.length) {
      tbody.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    tbody.innerHTML = data.map(r => {
      const estadoClass = {
        'completado': 'badge-ok', 'completo': 'badge-ok', 'ok': 'badge-ok', 'realizado': 'badge-ok',
        'en proceso': 'badge-warn', 'proceso': 'badge-warn', 'pendiente': 'badge-warn',
        'no iniciado': 'badge-err', 'cancelado': 'badge-err'
      }[String(r.estado || '').toLowerCase().trim()] || 'badge-info';

      const modalidadClass = {
        'virtual': 'badge-info', 'online': 'badge-info',
        'presencial': 'badge-neutral'
      }[String(r.modalidad || '').toLowerCase().trim()] || 'badge-neutral';

      return `<tr>
        <td><strong>${esc(r.nombre || '')}</strong></td>
        <td>${esc(r.area || '')}</td>
        <td><span class="badge badge-neutral">${esc(r.codAei || r.codaei || '')}</span></td>
        <td>${esc(r.fecha || '')}</td>
        <td><span class="badge ${modalidadClass}">${esc(r.modalidad || '')}</span></td>
        <td>${esc(r.participantes || '')}</td>
        <td>${esc(r.progresoEvidencia || r.progresoevidencia || '')}</td>
        <td><span class="badge ${estadoClass}">${esc(r.estado || '')}</span></td>
      </tr>`;
    }).join('');
  };

  window.capacitaciones_filterTable = function() {
    const q = document.getElementById('capacitacionesSearch').value.toLowerCase().trim();
    const data = window._capacitacionesData || [];
    if (!q) return capacitaciones_renderTable(data);
    const filtered = data.filter(r =>
      String(r.nombre || '').toLowerCase().includes(q) ||
      String(r.area || '').toLowerCase().includes(q) ||
      String(r.modalidad || '').toLowerCase().includes(q) ||
      String(r.codAei || r.codaei || '').toLowerCase().includes(q)
    );
    capacitaciones_renderTable(filtered);
  };


</script>
