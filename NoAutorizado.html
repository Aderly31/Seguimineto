<!doctype html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <?!= include_('Estilos'); ?>

    <style>
        body {
            background: url("<?= config.LOGIN_BG ?>") center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 20, 35, .65);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        .error-wrap {
            position: relative;
            z-index: 1;
            width: min(800px, 100%);
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .4);
            background: #fff;
        }

        .error-left {
            background: var(--grad-main);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .error-left i {
            font-size: 80px;
            margin-bottom: 24px;
            opacity: 0.9;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        .error-left h2 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
        }

        .error-right {
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .brand-mini img {
            height: 48px;
            object-fit: contain;
        }

        .brand-mini h1 {
            font-size: 18px;
            font-weight: 900;
            color: var(--c-primary);
            margin: 0;
            letter-spacing: 0.5px;
        }

        .error-title {
            font-size: 32px;
            font-weight: 300;
            color: #1e293b;
            margin: 0 0 16px;
        }

        .error-msg {
            font-size: 15px;
            line-height: 1.6;
            color: #64748b;
            margin: 0 0 32px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 16px;
            border-left: 4px solid var(--c-pink);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-outline {
            background: transparent;
            color: #64748b;
            border: 2px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }

        @media (max-width: 768px) {
            .error-wrap { grid-template-columns: 1fr; width: min(420px, 100%); }
            .error-left { padding: 30px; }
            .error-left i { font-size: 50px; }
            .error-right { padding: 34px 24px; }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <main class="error-wrap">
        <section class="error-left">
            <i class="fa-solid fa-shield-halved"></i>
            <h2>Acceso Restringido</h2>
        </section>

        <section class="error-right">
            <div class="brand-mini">
                <img src="<?= config.LOGO ?>" alt="Logo">
                <h1><?= config.NAME ?></h1>
            </div>

            <h3 class="error-title">Lo sentimos...</h3>
            
            <div class="error-msg">
                <?= message ?>
            </div>

            <div class="actions">
                <button class="btn-premium" onclick="goLogin()">
                    <i class="fa-solid fa-house"></i> Volver al inicio
                </button>
                <button class="btn-outline" onclick="changeAccount()">
                    <i class="fa-solid fa-user-gear"></i> Cambiar cuenta
                </button>
            </div>
        </section>
    </main>

    <script>
        function goLogin() {
            window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>";
        }
        function changeAccount() {
            window.top.location.href = "https://accounts.google.com/Logout";
        }
    </script>
</body>

</html>
