<!doctype html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, Arial;
            background: url("<?= loginBgUrl ?>") center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
        }

        .card {
            position: relative;
            width: min(720px, 100%);
            background: rgba(255, 255, 255, .93);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .25);
            z-index: 1;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .brand img {
            height: 56px;
            background: #fff;
            border-radius: 12px;
            padding: 6px;
        }

        h1 {
            margin: 0;
            color: #00417B;
            font-size: 20px;
        }

        p {
            margin: 10px 0 0;
            color: #334155;
        }

        .msg {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fdecea;
            border: 1px solid #f5c2c7;
            color: #7a1031;
            line-height: 1.4;
        }

        .actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid #e6e6e6;
            background: #fff;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn.primary {
            background: #00417B;
            color: #fff;
            border-color: #00417B;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="card">
        <div class="brand">
            <img src="<?= logoUrl ?>" alt="Logo">
            <div>
                <h1>
                    <?= appName ?>
                </h1>
                <p>Acceso restringido</p>
            </div>
        </div>

        <div class="msg">
            <?= message ?>
        </div>

        <div class="actions">
            <button class="btn primary" onclick="goLogin()">Volver</button>
            <button class="btn" onclick="changeAccount()">Cambiar cuenta</button>
        </div>
    </div>

    <script>
        function goLogin() {
            window.top.location.href = "<?= appUrl ?>?page=login";
        }
        function changeAccount() {
            // Puede no cerrar en todos los dominios, pero ayuda a “cambiar cuenta”
            window.top.location.href = "https://accounts.google.com/Logout";
        }
    </script>
</body>

</html>
