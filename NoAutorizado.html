<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso Restringido | <?= config.NAME ?></title>
    <style>
        :root {
            --c-primary: #00417B;
            --c-red: #e11d48;
            --bg: #f8fafc;
        }
        body {
            margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: white; border-radius: 32px; padding: 48px; width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); text-align: center;
            border: 1px solid #f1f5f9;
        }
        .icon-box {
            width: 80px; height: 80px; background: #fff1f2; color: var(--c-red);
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 24px;
        }
        h1 { margin: 0 0 12px; color: #0f172a; font-size: 24px; font-weight: 950; letter-spacing: -0.5px; }
        p { margin: 0 0 32px; color: #64748b; font-size: 15px; line-height: 1.6; }
        
        .msg-box {
            background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 16px;
            padding: 20px; margin-bottom: 32px; font-size: 14px; color: #475569; font-weight: 600;
        }

        .btn {
            display: block; width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-size: 14px; font-weight: 900; cursor: pointer; transition: all 0.2s;
            margin-bottom: 12px; text-decoration: none;
        }
        .btn-primary { background: var(--c-primary); color: white; box-shadow: 0 10px 15px rgba(0, 65, 123, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(0, 65, 123, 0.3); }
        .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
        .btn-ghost:hover { background: #f1f5f9; color: #1e293b; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Acceso Denegado</h1>
        <p>Lo sentimos, no tienes los permisos necesarios para acceder a esta sección del sistema.</p>
        
        <div class="msg-box">
            <i class="fa-solid fa-circle-info mr-2"></i> <?= message ?>
        </div>

        <button class="btn btn-primary" onclick="goHome()">
            <i class="fa-solid fa-house mr-2"></i> Ir al Inicio
        </button>
        <button class="btn btn-ghost" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket mr-2"></i> Cerrar Sesión
        </button>
    </div>

    <script>
        function goHome() {
            window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>";
        }
        function logout() {
            window.top.location.href = "https://accounts.google.com/Logout";
        }
    </script>
</body>
</html>
