<!doctype html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent-danger: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0; min-height: 100vh;
            font-family: 'Outfit', 'Inter', system-ui, sans-serif;
            background: #0f172a url("<?= loginBgUrl ?>") center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            color: white; overflow: hidden;
        }

        .overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(20px);
        }

        .card {
            position: relative; width: min(600px, 100%);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 60px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            z-index: 1; text-align: center;
            backdrop-filter: blur(30px);
            animation: zoomIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes zoomIn {
          from { opacity: 0; transform: scale(0.9); }
          to { opacity: 1; transform: scale(1); }
        }

        .lock-icon {
            width: 100px; height: 100px; background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: var(--accent-danger); margin: 0 auto 32px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .brand { margin-bottom: 32px; }
        .brand img { height: 64px; background: white; border-radius: 16px; padding: 10px; margin-bottom: 16px; }

        h1 { margin: 0; font-size: 32px; font-weight: 900; color: white; letter-spacing: -1px; }
        p { margin: 12px 0 0; color: rgba(255, 255, 255, 0.6); font-size: 18px; font-weight: 500; }

        .msg {
            margin: 32px 0; padding: 24px; border-radius: 20px;
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fecaca; font-size: 15px; line-height: 1.6; font-weight: 500;
        }

        .actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

        .btn {
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            padding: 16px 32px; border-radius: 16px; cursor: pointer;
            font-weight: 800; color: white; transition: all 0.2s; font-size: 14px;
        }
        .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .btn.primary { background: white; color: #0f172a; border-color: white; }
        .btn.primary:hover { background: #f1f5f9; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="card">
        <div class="brand">
            <img src="<?= logoUrl ?>" alt="Logo">
            <h1><?= appName ?></h1>
            <p>Acceso Restringido</p>
        </div>

        <div class="lock-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div class="msg">
            <?= message ?>
        </div>

        <div class="actions">
            <button class="btn primary" onclick="goLogin()">Volver al Inicio</button>
            <button class="btn" onclick="changeAccount()">Cambiar Cuenta</button>
        </div>
    </div>


    <script>
        function goLogin() {
            window.top.location.href = "<?= appUrl ?>?page=login";
        }
        function changeAccount() {
            // Puede no cerrar en todos los dominios, pero ayuda a “cambiar cuenta”
            window.top.location.href = "https://accounts.google.com/Logout";
        }
    </script>
</body>

</html>
