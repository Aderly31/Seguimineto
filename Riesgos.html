<div class="mod-container">
  <div class="mod-hero">
    <div class="mod-hero-content">
      <h1 class="mod-title"><i class="fa-solid fa-triangle-exclamation"></i> Riesgos</h1>
      <p class="mod-subtitle">Matriz de riesgos y acciones correctivas</p>
    </div>
    <div class="mod-hero-actions">
      <div class="mod-search">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="riesgosSearch" placeholder="Buscar riesgo..." oninput="riesgos_filterTable()">
      </div>
      <span class="mod-count" id="riesgosCount">0 registros</span>
    </div>
  </div>

  <div class="mod-card">
    <div class="mod-table-wrapper">
      <table class="mod-table" id="riesgosTable">
        <thead>
          <tr>
            <th>Riesgo</th>
            <th>Área</th>
            <th>Código AEI</th>
            <th>Causa</th>
            <th>Impacto</th>
            <th>Prioridad</th>
            <th>Acción</th>
            <th>Estado</th>
            <th>Fecha Objetivo</th>
          </tr>
        </thead>
        <tbody id="riesgosBody"></tbody>
      </table>
    </div>
    <div class="mod-empty" id="riesgosEmpty">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <p>No hay riesgos registrados</p>
    </div>
  </div>
</div>



<script>
  window.riesgos_init = function() {
    loadRiesgos();
  };

  function loadRiesgos() {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          window._riesgosData = res.data || [];
          riesgos_renderTable(window._riesgosData);
        } else {
          ui_showError("Error al cargar riesgos");
        }
      })
      .withFailureHandler(err => {
        console.error("Error Riesgos:", err);
        ui_showError("Error al cargar riesgos");
      })
      .riesgos_list();
  }

  window.riesgos_renderTable = function(data) {
    const tbody = document.getElementById('riesgosBody');
    const empty = document.getElementById('riesgosEmpty');
    const count = document.getElementById('riesgosCount');

    count.textContent = data.length + ' registros';

    if (!data.length) {
      tbody.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    tbody.innerHTML = data.map(r => {
      const prio = String(r.prioridad || '').toLowerCase().trim();
      const prioClass = {
        'alta': 'badge-critical', 'critico': 'badge-critical', 'critica': 'badge-critical',
        'media': 'badge-warn',
        'baja': 'badge-ok'
      }[prio] || 'badge-neutral';
      const estadoClass = {
        'completado': 'badge-ok', 'completo': 'badge-ok', 'ok': 'badge-ok', 'resuelto': 'badge-ok',
        'en proceso': 'badge-warn', 'proceso': 'badge-warn', 'pendiente': 'badge-warn',
        'abierto': 'badge-err', 'no iniciado': 'badge-err'
      }[String(r.estado || '').toLowerCase().trim()] || 'badge-info';

      return `<tr>
        <td><strong>${esc(r.riesgo || '')}</strong></td>
        <td>${esc(r.area || '')}</td>
        <td><span class="badge badge-neutral">${esc(r.codAei || r.codaei || '')}</span></td>
        <td>${esc(r.causa || '')}</td>
        <td>${esc(r.impacto || '')}</td>
        <td><span class="badge ${prioClass}">${esc(r.prioridad || '')}</span></td>
        <td>${esc(r.accion || '')}</td>
        <td><span class="badge ${estadoClass}">${esc(r.estado || '')}</span></td>
        <td>${esc(r.fechaObjetivo || r.fechaobjetivo || '')}</td>
      </tr>`;
    }).join('');
  };

  window.riesgos_filterTable = function() {
    const q = document.getElementById('riesgosSearch').value.toLowerCase().trim();
    const data = window._riesgosData || [];
    if (!q) return riesgos_renderTable(data);
    const filtered = data.filter(r =>
      String(r.riesgo || '').toLowerCase().includes(q) ||
      String(r.area || '').toLowerCase().includes(q) ||
      String(r.causa || '').toLowerCase().includes(q) ||
      String(r.impacto || '').toLowerCase().includes(q) ||
      String(r.codAei || r.codaei || '').toLowerCase().includes(q)
    );
    riesgos_renderTable(filtered);
  };


</script>
