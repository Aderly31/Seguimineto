<div id="formatod_root">
    <style>
        .fd-container { animation: fadeIn 0.4s ease; }
        .fd-header { 
            background: linear-gradient(135deg, var(--c-primary) 0%, #002d56 100%);
            padding: 32px; border-radius: 24px; color: white; margin-bottom: 32px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,65,123,0.15);
        }
        .fd-header h1 { font-size: 26px; font-weight: 950; margin: 0; letter-spacing: -1.5px; }
        .fd-header p { margin: 4px 0 0; opacity: 0.9; font-size: 14px; font-weight: 500; }

        .fd-card { background: white; border-radius: 24px; border: 1px solid var(--line); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .fd-table th { background: #f8fafc; padding: 16px; text-align: left; font-weight: 900; color: #475569; border-bottom: 1px solid var(--line); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .fd-table td { padding: 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        .fd-form-card { max-width: 850px; margin: 0 auto; background: white; border-radius: 32px; border: 1px solid var(--line); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .fd-form-header { padding: 32px 40px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 20px; background: #fcfcfd; border-radius: 32px 32px 0 0; }
        .fd-form-body { padding: 40px; }
        .fd-form-footer { padding: 24px 40px; background: #f8fafc; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 16px; border-radius: 0 0 32px 32px; }
        
        .field-label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .field-input { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 14px; transition: all 0.2s; outline: none; background: #fff; }
        .field-input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 4px rgba(0,65,123,0.1); background: #fff; }
        
        .btn-plus { background: white; color: var(--c-primary); border: none; padding: 12px 20px; border-radius: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>

    <div class="fd-container">
        <!-- List View -->
        <div id="fd_list_view">
            <header class="fd-header">
                <div>
                    <h1>Formato D: Capacitaciones</h1>
                    <p>Gestión de eventos formativos y fortalecimiento de capacidades</p>
                </div>
                <button class="btn-plus" onclick="FormatoDModule.openForm()">
                    <i class="fa-solid fa-graduation-cap"></i> Nueva Capacitación
                </button>
            </header>

            <div class="fd-card">
                <div class="fd-table-wrap">
                    <table class="fd-table">
                        <thead>
                            <tr>
                                <th>Área / Evento</th>
                                <th>Acción PEI (AEI)</th>
                                <th>Modalidad / Estado</th>
                                <th>Participantes / Evidencia</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="fd_table_body">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Form View -->
        <div id="fd_form_view" style="display:none;">
            <div class="fd-form-card">
                <div class="fd-form-header">
                    <div style="background:var(--c-primary); color:white; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                        <i class="fa-solid fa-users-gear"></i>
                    </div>
                    <div>
                        <h2 id="fd_form_title" style="margin:0; font-size:18px; font-weight:950;">Registro de Capacitación</h2>
                        <p style="margin:2px 0 0; font-size:12px; color:var(--muted);">Documente los detalles del evento formativo</p>
                    </div>
                </div>

                <form id="fd_form_element" onsubmit="FormatoDModule.save(event)">
                    <input type="hidden" id="fd_id">
                    <div class="fd-form-body">
                        <div class="form-grid">
                            <div class="form-col-full">
                                <label class="field-label">Nombre de la Capacitación *</label>
                                <input type="text" id="fd_nombre" class="field-input" required placeholder="Ej: Taller de Excel Avanzado">
                            </div>
                            
                            <div class="form-col-full">
                                <label class="field-label">Acción PEI (Vinculada) *</label>
                                <select id="fd_aei" class="field-input" required>
                                    <option value="" disabled selected>Seleccione acción PEI...</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="field-label">Fecha del Evento *</label>
                                <input type="date" id="fd_fecha" class="field-input" required>
                            </div>

                            <div>
                                <label class="field-label">Modalidad *</label>
                                <select id="fd_modalidad" class="field-input" required>
                                    <option value="Presencial">Presencial</option>
                                    <option value="Virtual">Virtual</option>
                                    <option value="Híbrida">Híbrida</option>
                                </select>
                            </div>

                            <div>
                                <label class="field-label">N° de Participantes *</label>
                                <input type="number" id="fd_participantes" class="field-input" required min="0">
                            </div>

                            <div>
                                <label class="field-label">Estado actual *</label>
                                <select id="fd_estado" class="field-input" required>
                                    <option value="Programado">Programado</option>
                                    <option value="En Ejecución">En Ejecución</option>
                                    <option value="Completado">Completado</option>
                                </select>
                            </div>

                            <div class="form-col-full">
                                <label class="field-label">Progreso de Evidencia / Comentarios</label>
                                <textarea id="fd_progreso" class="field-input" rows="2" placeholder="Describa el estado de la documentación..."></textarea>
                            </div>

                            <div class="form-col-full">
                                <label class="field-label">Cargar Evidencia (Opcional)</label>
                                <input type="file" id="fd_file" class="field-input" accept="image/*,.pdf,.xlsx,.doc">
                                <div id="fd_file_info" class="text-[10px] mt-1 font-bold text-blue-600"></div>
                            </div>
                        </div>
                    </div>

                    <div class="fa-form-footer">
                        <button type="button" class="btn-obs" onclick="FormatoDModule.closeForm()">Cancelar</button>
                        <button type="submit" class="btn-app">Guardar Capacitación</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        /**
         * FormatoDModule (Core v2 Modular)
         */
        window.FormatoDModule = (() => {
            const state = {
                data: [],
                pei: []
            };

            const init = () => {
                load();
            };

            const load = () => {
                ui_showLoading("Cargando capacitaciones...");
                google.script.run.withSuccessHandler(res => {
                    state.pei = res.pei;
                    renderSelectPei(res.pei);
                    
                    google.script.run.withSuccessHandler(data => {
                        ui_hideLoading();
                        state.data = data;
                        renderTable(data);
                    }).formatoD_get();
                }).common_getAppData();
            };

            const renderSelectPei = (pei) => {
                const sel = document.getElementById('fd_aei');
                if(!sel) return;
                sel.innerHTML = '<option value="" disabled selected>Seleccione acción PEI...</option>' + 
                    pei.map(p => `<option value="${p.codAei}">[${p.codAei}] ${p.accion}</option>`).join('');
            };

            const renderTable = (items) => {
                const tbody = document.getElementById('fd_table_body');
                if(!items.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-10 text-muted">No hay capacitaciones registradas.</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(it => {
                    let badgeClass = 'badge-obs';
                    if(it.estado === 'En Ejecución') badgeClass = 'badge-primary';
                    if(it.estado === 'Completado') badgeClass = 'badge-success';
                    
                    return `
                        <tr>
                            <td>
                                <div class="text-[10px] font-black text-primary uppercase mb-1">${it.area || '---'}</div>
                                <div class="font-black text-slate-800">${it.nombre}</div>
                                <div class="text-[11px] text-muted font-bold"><i class="fa-regular fa-calendar mr-1"></i> ${it.fecha || '-'}</div>
                            </td>
                            <td><div class="text-xs font-bold text-slate-600 max-w-[200px]">PEI: ${it.codAei || 'Sin vincular'}</div></td>
                            <td>
                                <div class="text-xs font-bold text-slate-700 mb-1">${it.modalidad}</div>
                                <span class="badge ${badgeClass}">${it.estado}</span>
                            </td>
                            <td>
                                <div class="text-xs font-black text-slate-700 mb-1">${it.participantes} Participantes</div>
                                ${it.imagen && it.imagen.startsWith('http') 
                                  ? `<a href="${it.imagen}" target="_blank" class="flex items-center gap-1 text-[11px] font-black text-blue-600"><i class="fa-solid fa-paperclip"></i> Ver evidencia</a>`
                                  : '<span class="badge badge-obs" style="font-size:9px;">Sin evidencia</span>'}
                            </td>
                            <td class="text-right">
                                <button class="btn-icon" onclick="FormatoDModule.edit('${it.id}')" title="Editar">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            };

            const openForm = () => {
                document.getElementById('fd_list_view').style.display = 'none';
                document.getElementById('fd_form_view').style.display = 'block';
                document.getElementById('fd_form_element').reset();
                document.getElementById('fd_id').value = '';
                document.getElementById('fd_file_info').textContent = '';
                document.getElementById('fd_form_title').textContent = 'Nueva Capacitación';
            };

            const closeForm = () => {
                document.getElementById('fd_list_view').style.display = 'block';
                document.getElementById('fd_form_view').style.display = 'none';
            };

            const edit = (id) => {
                const it = state.data.find(x => x.id === id);
                if(!it) return;
                
                openForm();
                document.getElementById('fd_form_title').textContent = 'Editar Capacitación';
                document.getElementById('fd_id').value = it.id;
                document.getElementById('fd_nombre').value = it.nombre;
                document.getElementById('fd_fecha').value = it.fecha || '';
                document.getElementById('fd_aei').value = it.codAei;
                document.getElementById('fd_modalidad').value = it.modalidad;
                document.getElementById('fd_participantes').value = it.participantes;
                document.getElementById('fd_progreso').value = it.progresoEvidencia;
                document.getElementById('fd_estado').value = it.estado;
                
                if(it.imagen && it.imagen.startsWith('http')) {
                    document.getElementById('fd_file_info').innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> Evidencia cargada previamente.`;
                }
            };

            const save = (e) => {
                e.preventDefault();
                const fileInput = document.getElementById('fd_file');
                const file = fileInput.files[0];

                const executeSave = (fileData = null) => {
                    const data = {
                        id: document.getElementById('fd_id').value,
                        nombre: document.getElementById('fd_nombre').value,
                        fecha: document.getElementById('fd_fecha').value,
                        codAei: document.getElementById('fd_aei').value,
                        modalidad: document.getElementById('fd_modalidad').value,
                        participantes: document.getElementById('fd_participantes').value,
                        progresoEvidencia: document.getElementById('fd_progreso').value,
                        estado: document.getElementById('fd_estado').value,
                        fileData: fileData
                    };

                    ui_showLoading("Guardando capacitación...");
                    google.script.run.withSuccessHandler(res => {
                        ui_hideLoading();
                        if (res.success) {
                            Swal.fire('Éxito', 'Capacitación guardada correctamente', 'success');
                            closeForm();
                            load();
                        } else { 
                            Swal.fire('Error', res.message, 'error'); 
                        }
                    }).formatoD_save(data);
                };

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        executeSave({
                            base64: ev.target.result.split(',')[1],
                            name: file.name,
                            type: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                } else {
                    executeSave();
                }
            };

            return { init, openForm, closeForm, edit, save };
        })();
    </script>
</div>
