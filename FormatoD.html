<div id="formatoD_root">
    <header class="view-header">
        <div class="view-title">
            <h1>Formato D: Capacitaciones</h1>
            <p><i class="fa-solid fa-calendar-days"></i> Periodo de Reporte: Ene - Jun 2024</p>
        </div>
        <button class="btn-primary" onclick="formatoD_add()">
            <i class="fa-solid fa-plus"></i> Registrar Capacitación
        </button>
    </header>

    <!-- Tabs Vista -->
    <div class="view-tabs">
        <button class="tab-link active" onclick="formatoD_switchTab('grid', this)"><i class="fa-solid fa-table-cells-large"></i> Vista Tarjetas</button>
        <button class="tab-link" onclick="formatoD_switchTab('calendar', this)"><i class="fa-solid fa-calendar"></i> Calendario</button>
    </div>

    <!-- Barra de Filtros -->
    <div class="filters-container">
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Buscar por Nombre de Capacitación o facilitador..." oninput="formatoD_filter(this.value)">
        </div>
        <div class="select-wrap">
            <select name="modalidad">
                <option value="">Todas las Modalidades</option>
                <option value="Virtual">Virtual</option>
                <option value="Presencial">Presencial</option>
            </select>
        </div>
        <div class="select-wrap">
            <select name="estado">
                <option value="">Estado</option>
                <option value="ENVIADO">Enviado</option>
                <option value="BORRADOR">Borrador</option>
            </select>
        </div>
        <button class="btn-filter-tag danger">
            <i class="fa-solid fa-triangle-exclamation"></i> Evidencia Pendiente <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Grilla de Tarjetas -->
    <div class="trainings-grid" id="formatoD_grid">
        <!-- Dinámico -->
    </div>

    <!-- Barra de cumplimiento footer -->
    <footer class="compliance-footer">
        <div class="compliance-info">
            <div class="label">CUMPLIMIENTO GENERAL</div>
            <div class="meta">Meta de reporte institucional: 100%</div>
        </div>
        <div class="compliance-progress">
            <div class="progress-bar">
                <div class="progress-fill" id="formatoD_totalProgress" style="width: 0%"></div>
            </div>
            <div class="percentage" id="formatoD_percentText">0%</div>
        </div>
        <div class="footer-actions">
            <a href="#">Exportar Reporte PDF</a>
            <a href="#">Manual de Usuario</a>
        </div>
    </footer>
</div>

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.4);
        --glow-primary: #6366f1;
        --glow-secondary: #0ea5e9;
        --accent-danger: #ef4444;
        --accent-success: #10b981;
        --accent-warning: #f59e0b;
        --text-main: #1e293b;
        --text-muted: #64748b;
    }

    #formatoD_root { 
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        padding-bottom: 120px;
    }

    @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Premium Header */
    .view-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: flex-end; 
        margin-bottom: 32px; 
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        padding: 40px;
        border-radius: 24px;
        color: white;
        box-shadow: 0 20px 40px -12px rgba(79, 70, 229, 0.3);
    }

    .view-title h1 { 
        font-size: 32px; 
        font-weight: 900; 
        margin: 0; 
        color: white; 
        letter-spacing: -1px;
    }

    .view-title p { color: rgba(255, 255, 255, 0.9); margin: 8px 0 0; font-weight: 500; }

    .btn-primary { 
        background: white; 
        color: #4f46e5; 
        border: none; 
        padding: 14px 24px; 
        border-radius: 12px; 
        font-weight: 800; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        gap: 10px;
        transition: all 0.2s;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 20px -5px rgba(0,0,0,0.15); }

    /* Modern Tabs */
    .view-tabs { display: flex; gap: 8px; border-bottom: 2px solid #f1f5f9; margin-bottom: 32px; }
    .tab-link { 
        background: none; border: none; padding: 14px 24px; font-weight: 800; font-size: 14px; color: var(--text-muted); 
        cursor: pointer; position: relative; display: flex; align-items: center; gap: 10px; transition: all 0.2s;
    }
    .tab-link:hover { color: var(--text-main); }
    .tab-link.active { color: var(--glow-primary); }
    .tab-link.active::after { content: ""; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background: var(--glow-primary); border-radius: 999px; box-shadow: 0 -2px 10px rgba(99, 102, 241, 0.4); }

    /* Filters Container Glass */
    .filters-container { 
        display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; 
        background: var(--glass-bg); padding: 16px; border-radius: 20px; border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px);
    }
    
    .search-wrap { position: relative; flex: 1; min-width: 280px; }
    .search-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .search-wrap input { 
        width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 14px 12px 48px; 
        outline: none; font-size: 14px; transition: all 0.2s; font-weight: 500;
    }
    .search-wrap input:focus { border-color: var(--glow-primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

    .select-wrap select { 
        background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; 
        outline: none; font-weight: 800; color: var(--text-main); font-size: 13px; cursor: pointer;
    }

    .btn-filter-tag { 
        display: flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2); 
        background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .btn-filter-tag:hover { background: rgba(239, 68, 68, 0.15); }

    /* Trainings Grid with Premium Cards */
    .trainings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 32px; margin-bottom: 60px; }
    
    .training-card { 
        background: white; border: 1px solid #f1f5f9; border-radius: 28px; padding: 32px; position: relative;
        display: flex; flex-direction: column; gap: 24px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .training-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); border-color: var(--glow-primary); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .status-tag-sm { 
        padding: 6px 12px; border-radius: 999px; font-size: 10px; font-weight: 900; 
        text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-tag-sm.enviado { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-tag-sm.borrador { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); border: 1px solid rgba(245, 158, 11, 0.2); }

    .card-title-wrap h3 { font-size: 20px; font-weight: 950; color: var(--text-main); margin: 0 0 8px; line-height: 1.3; letter-spacing: -0.5px; }
    .card-date { font-size: 14px; color: var(--text-muted); font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .card-date i { color: var(--glow-primary); }

    .card-pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill { padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .pill.blue { background: rgba(99, 102, 241, 0.1); color: var(--glow-primary); }
    .pill.gray { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }

    .evidence-status { border-top: 1px solid #f1f5f9; padding-top: 24px; margin-top: auto; }
    .evidence-msg { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 800; }
    .evidence-msg.ok { color: var(--accent-success); }
    .evidence-msg.pending { color: var(--accent-danger); margin-bottom: 16px; }

    .btn-secondary-sm { 
        width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2); 
        background: rgba(239, 68, 68, 0.05); color: var(--accent-danger); font-weight: 900; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary-sm:hover { background: rgba(239, 68, 68, 0.1); transform: translateY(-1px); }

    .card-actions { font-size: 14px; font-weight: 900; color: var(--glow-primary); text-align: right; margin-top: 16px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
    .card-actions:hover { opacity: 1; text-decoration: underline; }

    /* Footer Premium Fixed */
    .compliance-footer { 
        position: fixed; bottom: 0; left: 300px; right: 0; 
        background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
        border-top: 1px solid var(--glass-border); padding: 24px 48px; display: flex; align-items: center; gap: 48px; 
        z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); transition: left 0.3s ease;
    }
    .app.sidebar-collapsed .compliance-footer { left: 88px; }
    
    .compliance-info { flex-shrink: 0; }
    .compliance-info .label { font-size: 15px; font-weight: 900; color: var(--text-main); margin-bottom: 4px; letter-spacing: 0.5px; }
    .compliance-info .meta { font-size: 12px; color: var(--text-muted); font-weight: 700; }

    .compliance-progress { flex: 1; display: flex; align-items: center; gap: 24px; }
    .compliance-progress .progress-bar { flex: 1; height: 12px; background: #eef2f7; border-radius: 9999px; overflow: hidden; }
    .compliance-progress .progress-fill { 
        height: 100%; background: linear-gradient(90deg, var(--glow-primary), var(--glow-secondary)); 
        border-radius: 9999px; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
    }
    .compliance-progress .percentage { font-size: 24px; font-weight: 950; color: var(--glow-primary); letter-spacing: -1px; }

    .footer-actions { display: flex; gap: 24px; font-size: 13px; font-weight: 800; }
    .footer-actions a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .footer-actions a:hover { color: var(--glow-primary); }

    @media (max-width: 1100px) {
        .compliance-footer { left: 0; padding: 24px; gap: 20px; flex-direction: column; text-align: center; }
        .app.sidebar-collapsed .compliance-footer { left: 0; }
        .compliance-progress { width: 100%; order: -1; }
        .footer-actions { width: 100%; justify-content: center; }
        .view-header { flex-direction: column; align-items: flex-start; gap: 24px; padding: 30px; }
    }
</style>

<script>
    (function init() {
        formatoD_load();
    })();

    function formatoD_load() {
        google.script.run
            .withSuccessHandler(data => {
                renderTrainings(data);
            })
            .formatoD_getTrainings();

        google.script.run
            .withSuccessHandler(summary => {
                const fill = document.getElementById('formatoD_totalProgress');
                const text = document.getElementById('formatoD_percentText');
                fill.style.width = summary.cumplimientoGeneral + '%';
                text.textContent = summary.cumplimientoGeneral + '%';
            })
            .formatoD_getSummary();
    }

    function renderTrainings(items) {
        const grid = document.getElementById('formatoD_grid');
        grid.innerHTML = items.map(it => `
            <div class="training-card">
                <div class="card-header">
                    <span class="status-tag-sm ${it.estado.toLowerCase()}">${it.estado}</span>
                    <button class="btn-icon-sm"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
                <div class="card-title-wrap">
                    <h3>Nombre de Capacitación: ${it.nombre}</h3>
                    <div class="card-date"><i class="fa-regular fa-calendar"></i> Fecha: ${it.fecha}</div>
                </div>
                <div class="card-pills">
                    <span class="pill blue"><i class="fa-solid fa-desktop"></i> Modalidad: ${it.modalidad}</span>
                    <span class="pill gray"><i class="fa-solid fa-user-group"></i> Nº Participantes: ${it.participantes}</span>
                </div>
                <div class="evidence-status">
                    ${it.evidenciaCompleta ? `
                        <div class="evidence-msg ok"><i class="fa-solid fa-circle-check"></i> Evidencia Completa</div>
                    ` : `
                        <div class="evidence-msg pending"><i class="fa-solid fa-circle-exclamation"></i> Evidencia Obligatoria <strong>REQUERIDO</strong></div>
                        <div class="progress-bar-sm" style="height: 6px; background: #fee2e2; border-radius: 10px; margin-bottom: 12px;">
                            <div style="height: 100%; width: ${it.progresoEvidencia}%; background: #ef4444; border-radius: 10px;"></div>
                        </div>
                        <button class="btn-secondary-sm" onclick="formatoD_uploadEvidence('${it.id}')">Subir Lista de Asistencia</button>
                    `}
                </div>
                <div class="card-actions" onclick="formatoD_details('${it.id}')">Ver Detalles</div>
            </div>
        `).join('');
    }

    function formatoD_switchTab(tab, btn) {
        const btns = document.querySelectorAll('.tab-link');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        Swal.fire({ icon: 'info', title: 'Cambio de Vista', text: 'Cargando vista de ' + tab, timer: 800, showConfirmButton: false });
    }

    function formatoD_add() {
        Swal.fire('Registrar Capacitación', 'Abriendo formulario de registro...', 'info');
    }

    function formatoD_uploadEvidence(id) {
        Swal.fire('Subir Evidencia', 'ID: ' + id + ' - Seleccione el archivo de asistencia.', 'info');
    }

    function formatoD_details(id) {
        Swal.fire('Detalles', 'Cargando información completa de la capacitación ' + id, 'info');
    }

    function formatoD_filter(q) {
        console.log('Buscando:', q);
    }
</script>
