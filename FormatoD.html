<div id="formatoD_root">
    <style>
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
            padding: 40px;
            border-radius: 24px;
            color: white;
            box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
        }

        .cap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card-premium {
            background: white;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            padding: 24px;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .card-premium:hover {
            border-color: #00417B;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .custom-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            background: #fcfcfd;
        }

        .compliance-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 32px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }

        .progress-track {
            flex: 1;
            height: 12px;
            background: #eef2f7;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00417B;
            border-radius: 999px;
            transition: width 1s ease;
        }
    </style>

    <div class="header-actions">
        <div>
            <h2 style="margin:0; font-size:32px; font-weight:950;">Formato D: Capacitaciones</h2>
            <p style="margin:8px 0 0; opacity:0.9;">Registro y control de formación continua</p>
        </div>
        <button
            style="background:white; color:#00417B; border:none; padding:14px 24px; border-radius:12px; font-weight:900; cursor:pointer;"
            onclick="modalCap()">+ Registrar Capacitación</button>
    </div>

    <!-- Barra de Cumplimiento -->
    <div class="compliance-bar">
        <div>
            <div style="font-size:14px; font-weight:900; color:#1e293b;">Cumplimiento Institucional</div>
            <div style="font-size:11px; color:#64748b; font-weight:700;">Meta del periodo: 100%</div>
        </div>
        <div class="progress-track">
            <div id="compFill" class="progress-fill" style="width: 0%"></div>
        </div>
        <div id="compText" style="font-size: 24px; font-weight: 950; color: #00417B;">0%</div>
    </div>

    <div id="gridCap" class="cap-grid"></div>

    <script>
        let CACHE_CAPS = [];

        function formatoD_load() {
            google.script.run.withSuccessHandler(data => {
                CACHE_CAPS = data;
                renderCaps(data);

                // Simular cálculo de cumplimiento
                const total = data.length;
                const completados = data.filter(c => c.estado === 'Realizado').length;
                const perc = total ? Math.round((completados / total) * 100) : 0;
                document.getElementById('compFill').style.width = perc + '%';
                document.getElementById('compText').textContent = perc + '%';
            }).formatoD_get();
        }

        function renderCaps(items) {
            const grid = document.getElementById('gridCap');
            if (!items.length) { grid.innerHTML = '<div style="grid-column:1/-1; padding:40px; text-align:center; color:#64748b;">No hay capacitaciones.</div>'; return; }

            grid.innerHTML = items.map(c => `
            <div class="card-premium">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <span style="font-size:11px; font-weight:900; background:#f1f5f9; padding:4px 10px; border-radius:8px; color:#475569;">${c.modalidad}</span>
                    <span style="font-size:11px; font-weight:900; color:${c.estado === 'Realizado' ? '#10b981' : '#f59e0b'};">${c.estado}</span>
                </div>
                <h3 style="margin:0 0 16px; font-size:18px; color:#1e293b; font-weight:950;">${c.nombre}</h3>
                <div style="font-size:13px; color:#64748b; margin-bottom:8px;"><i class="fa-solid fa-calendar"></i> Fecha: <strong>${c.fecha}</strong></div>
                <div style="font-size:13px; color:#64748b; margin-bottom:16px;"><i class="fa-solid fa-users"></i> Participantes: <strong>${c.participantes}</strong></div>
                
                <button style="width:100%; background:#f8fafc; border:1px solid #e2e8f0; padding:10px; border-radius:12px; font-weight:900; cursor:pointer; color:#00417B;" onclick="modalCap('${c.id}')">EDITAR DETALLES</button>
            </div>`).join('');
        }

        function modalCap(id = null) {
            const data = id ? CACHE_CAPS.find(x => x.id === id) : null;
            Swal.fire({
                title: data ? 'Editar Capacitación' : 'Nueva Capacitación',
                html: `
                    <div style="text-align:left;">
                        <input type="hidden" id="fD_id" value="${data ? data.id : ''}">
                        <label style="font-size:12px; font-weight:800;">Nombre de la Capacitación</label>
                        <input id="fD_nombre" class="custom-input" value="${data ? data.nombre : ''}">
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div><label style="font-size:12px; font-weight:800;">Fecha</label><input type="date" id="fD_fecha" class="custom-input" value="${data ? data.fecha : ''}"></div>
                            <div><label style="font-size:12px; font-weight:800;">Participantes</label><input type="number" id="fD_participantes" class="custom-input" value="${data ? data.participantes : ''}"></div>
                        </div>
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div>
                                <label style="font-size:12px; font-weight:800;">Modalidad</label>
                                <select id="fD_modalidad" class="custom-input">
                                    <option ${data?.modalidad == 'Virtual' ? 'selected' : ''}>Virtual</option>
                                    <option ${data?.modalidad == 'Presencial' ? 'selected' : ''}>Presencial</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size:12px; font-weight:800;">Estado</label>
                                <select id="fD_estado" class="custom-input">
                                    <option ${data?.estado == 'Programado' ? 'selected' : ''}>Programado</option>
                                    <option ${data?.estado == 'Realizado' ? 'selected' : ''}>Realizado</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonColor: '#00417B',
                confirmButtonText: 'Guardar',
                preConfirm: () => ({
                    id: document.getElementById('fD_id').value,
                    nombre: document.getElementById('fD_nombre').value,
                    fecha: document.getElementById('fD_fecha').value,
                    participantes: document.getElementById('fD_participantes').value,
                    modalidad: document.getElementById('fD_modalidad').value,
                    estado: document.getElementById('fD_estado').value
                })
            }).then(r => {
                if (r.isConfirmed) {
                    Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
                    google.script.run.withSuccessHandler(res => {
                        if (res.success) { Swal.fire({ icon: 'success', title: 'Guardado', timer: 1500 }); formatoD_load(); }
                        else Swal.fire('Error', res.message, 'error');
                    }).formatoD_save(r.value);
                }
            });
        }
        formatoD_load();
    </script>
</div>
