<div id="usuarios_root">
    <style>
        .u-container { animation: fadeIn 0.4s ease; }
        
        /* Banner Header */
        .u-header { 
            background: linear-gradient(135deg, var(--c-primary) 0%, #002d56 100%);
            padding: 32px; border-radius: 24px; color: white; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,65,123,0.15);
        }
        .u-header h1 { font-size: 24px; font-weight: 950; margin: 0; letter-spacing: -1px; }
        .u-header p { margin: 4px 0 0; opacity: 0.8; font-size: 14px; }

        /* Actions Bar */
        .u-toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
        .u-search-box { 
            flex: 1; display: flex; align-items: center; gap: 10px; 
            background: #f1f5f9; border-radius: 14px; padding: 10px 16px; border: 1px solid var(--line);
        }
        .u-search-box input { border: 0; background: transparent; outline: none; width: 100%; font-size: 14px; font-weight: 600; }
        
        /* Table Card */
        .u-card { background: white; border-radius: 20px; border: 1px solid var(--line); overflow: hidden; }
        .u-table-wrap { overflow-x: auto; }
        .u-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .u-table th { background: #f8fafc; padding: 14px; text-align: left; font-weight: 800; color: #475569; border-bottom: 1px solid var(--line); }
        .u-table td { padding: 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        /* Badges */
        .u-badge { padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid #e2e8f0; }
        .u-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .u-dot-on { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .u-dot-off { background: #ef4444; box-shadow: 0 0 6px #ef4444; }

        /* Modal Premium */
        .u-modal { position: fixed; inset: 0; display: none; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .u-modal.show { display: flex; }
        .u-modal-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); }
        .u-modal-card { 
            position: relative; width: 100%; max-width: 600px; background: white; border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; animation: modalIn 0.3s ease;
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }

        .u-modal-header { padding: 30px; border-bottom: 1px solid var(--line); background: #fcfcfd; display: flex; justify-content: space-between; align-items: center; }
        .u-modal-body { padding: 30px; }
        .u-modal-footer { padding: 20px 30px; background: #f8fafc; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 12px; }

        .field-group { margin-bottom: 20px; }
        .field-label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .field-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 14px; outline: none; transition: all 0.2s; }
        .field-input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 4px rgba(0,65,123,0.1); }

        .btn-plus { background: white; color: var(--c-primary); border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-plus:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>

    <div class="u-container">
        <header class="u-header">
            <div>
                <h1>Gestión de Usuarios</h1>
                <p>Control de accesos, roles y permisos del sistema</p>
            </div>
            <button class="btn-plus" onclick="u_openCreate()">
                <i class="fa-solid fa-user-plus"></i> Nuevo Usuario
            </button>
        </header>

        <div class="u-toolbar">
            <div class="u-search-box">
                <i class="fa-solid fa-magnifying-glass text-muted"></i>
                <input id="u_q" type="text" placeholder="Buscar por email, nombre o rol..." oninput="u_render()">
            </div>
            <button class="btn-icon" onclick="u_load()" title="Actualizar">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>

        <div class="u-card">
            <div class="u-table-wrap">
                <table class="u-table">
                    <thead>
                        <tr>
                            <th>Email Institucional</th>
                            <th>Nombre Completo</th>
                            <th>Rol / Nivel</th>
                            <th>Estado</th>
                            <th class="text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="u_tbody">
                        <!-- Dinámico -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="u_modal" class="u-modal">
        <div class="u-modal-overlay" onclick="u_closeModal()"></div>
        <div class="u-modal-card">
            <div class="u-modal-header">
                <div>
                    <h3 id="u_mTitle" style="margin:0; font-size:18px; font-weight:950;">Usuario</h3>
                    <p style="margin:2px 0 0; font-size:12px; color:var(--muted);">Administre las credenciales de acceso</p>
                </div>
                <button class="btn-icon" onclick="u_closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="u-modal-body">
                <form id="u_form">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div class="field-group" style="grid-column: span 2;">
                            <label class="field-label">Email *</label>
                            <input id="uf_email" type="email" class="field-input" placeholder="ejemplo@uandina.edu.pe" required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Nombre *</label>
                            <input id="uf_nombre" type="text" class="field-input" placeholder="Nombres" required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Apellido *</label>
                            <input id="uf_apellido" type="text" class="field-input" placeholder="Apellidos" required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Rol de Sistema *</label>
                            <select id="uf_rol" class="field-input" required>
                                <option value="">Cargando roles...</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Estado de Cuenta</label>
                            <div style="display:flex; align-items:center; gap:10px; padding:10px 0;">
                                <input id="uf_activo" type="checkbox" checked style="width:20px; height:20px; cursor:pointer;">
                                <span id="uf_status_text" style="font-size:14px; font-weight:700; color:var(--c-primary);">Cuenta Activa</span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="u-modal-footer">
                <button class="btn-obs" onclick="u_closeModal()">Cancelar</button>
                <button class="btn-app" onclick="u_save()">Guardar Usuario</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Lógica del Módulo: Usuarios
         */
        window.U_STATE = {
            users: [],
            roles: [],
            isEdit: false
        };

        function usuarios_init() {
            u_load();
        }

        function u_load() {
            ui_showLoading("Cargando directorio...");
            google.script.run.withSuccessHandler(list => {
                ui_hideLoading();
                window.U_STATE.users = list;
                u_render();
                u_loadRoles();
            }).usuarios_listar();
        }

        function u_loadRoles() {
            google.script.run.withSuccessHandler(list => {
                window.U_STATE.roles = list;
                const sel = document.getElementById('uf_rol');
                sel.innerHTML = '<option value="">Seleccione rol</option>' + 
                    list.map(r => `<option value="${r}">${r.toUpperCase()}</option>`).join('');
            }).usuarios_roles_listar();
        }

        function u_render() {
            const q = document.getElementById('u_q').value.toLowerCase();
            const tbody = document.getElementById('u_tbody');
            
            const filtered = window.U_STATE.users.filter(u => {
                const searchStr = `${u.email} ${u.nombre} ${u.apellido} ${u.rol}`.toLowerCase();
                return !q || searchStr.includes(q);
            });

            if(!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-10 text-muted">No se encontraron usuarios.</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td><div class="font-black text-primary">${u.email}</div></td>
                    <td><div class="font-bold text-slate-700">${u.nombre} ${u.apellido}</div></td>
                    <td><span class="u-badge">${u.rol.toUpperCase()}</span></td>
                    <td>
                        <div class="flex items-center">
                            <span class="u-dot ${u.activo ? 'u-dot-on' : 'u-dot-off'}"></span>
                            <span class="text-xs font-bold ${u.activo ? 'text-green-600' : 'text-red-600'}">${u.activo ? 'ACTIVO' : 'INACTIVO'}</span>
                        </div>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button class="btn-icon" onclick="u_openEdit('${encodeURIComponent(u.email)}')" title="Editar">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="btn-icon text-red-500" onclick="u_delete('${encodeURIComponent(u.email)}')" title="Eliminar">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function u_openModal(title) {
            document.getElementById('u_mTitle').textContent = title;
            document.getElementById('u_modal').classList.add('show');
        }

        function u_closeModal() {
            document.getElementById('u_modal').classList.remove('show');
        }

        function u_openCreate() {
            window.U_STATE.isEdit = false;
            document.getElementById('u_form').reset();
            document.getElementById('uf_email').disabled = false;
            u_openModal("Nuevo Usuario");
        }

        function u_openEdit(emailEnc) {
            const email = decodeURIComponent(emailEnc);
            const user = window.U_STATE.users.find(u => u.email === email);
            if(!user) return;

            window.U_STATE.isEdit = true;
            document.getElementById('uf_email').value = user.email;
            document.getElementById('uf_email').disabled = true;
            document.getElementById('uf_nombre').value = user.nombre;
            document.getElementById('uf_apellido').value = user.apellido;
            document.getElementById('uf_rol').value = user.rol;
            document.getElementById('uf_activo').checked = user.activo;
            
            u_openModal("Editar Usuario");
        }

        function u_save() {
            const data = {
                email: document.getElementById('uf_email').value,
                nombre: document.getElementById('uf_nombre').value,
                apellido: document.getElementById('uf_apellido').value,
                rol: document.getElementById('uf_rol').value,
                estado: document.getElementById('uf_activo').checked
            };

            if(!data.email || !data.rol) return Swal.fire("Atención", "Email y Rol son obligatorios", "warning");

            ui_showLoading("Guardando...");
            google.script.run.withSuccessHandler(res => {
                ui_hideLoading();
                if(res.ok) {
                    Swal.fire("Éxito", "Usuario guardado correctamente", "success");
                    u_closeModal();
                    u_load();
                }
            }).usuarios_save(data);
        }

        function u_delete(emailEnc) {
            const email = decodeURIComponent(emailEnc);
            Swal.fire({
                title: "¿Eliminar usuario?",
                text: `Esta acción no se puede deshacer para ${email}`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#ef4444",
                confirmButtonText: "Eliminar definitivamente"
            }).then(r => {
                if(r.isConfirmed) {
                    ui_showLoading("Eliminando...");
                    google.script.run.withSuccessHandler(() => {
                        ui_hideLoading();
                        Swal.fire("Eliminado", "El usuario ha sido removido", "success");
                        u_load();
                    }).usuarios_delete(email);
                }
            });
        }
        
        document.getElementById('uf_activo').onchange = (e) => {
            document.getElementById('uf_status_text').textContent = e.target.checked ? 'Cuenta Activa' : 'Cuenta Suspendida';
            document.getElementById('uf_status_text').style.color = e.target.checked ? 'var(--c-primary)' : 'var(--accent-danger)';
        };
    </script>
</div>
