<div id="formatoC_root">
    <style>
        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
            padding: 40px;
            border-radius: 24px;
            color: white;
            box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
        }

        .grid-riesgos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .card-premium {
            background: white;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            padding: 24px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .card-premium:hover {
            border-color: #f59e0b;
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.15);
            transform: translateY(-5px);
        }

        .badge-status {
            position: absolute;
            top: 24px;
            right: 24px;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .custom-input,
        .custom-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            background: #fcfcfd;
        }
    </style>

    <div class="view-header">
        <div>
            <h2 style="margin:0; font-size:32px;">Formato C: Riesgos</h2>
            <p style="margin:8px 0 0; opacity:0.9;">Gestión de brechas y acciones de mitigación</p>
        </div>
        <button
            style="background:white; color:#00417B; border:none; padding:14px 24px; border-radius:12px; font-weight:900; cursor:pointer;"
            onclick="modalRiesgo()">+ Registrar Riesgo</button>
    </div>

    <div id="gridRiesgos" class="grid-riesgos">
        <div style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 40px;">Cargando datos...</div>
    </div>

    <script>
        let CACHE_RIESGOS = [];

        function formatoC_load() {
            google.script.run
                .withSuccessHandler(data => {
                    CACHE_RIESGOS = data;
                    renderRiesgos(data);
                })
                .withFailureHandler(err => {
                    Swal.fire('Error de Conexión', String(err), 'error');
                })
                .formatoC_get();
        }

        function renderRiesgos(items) {
            const grid = document.getElementById('gridRiesgos');
            if (!items || items.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; padding:40px; text-align:center; color:#64748b; font-weight:800; background:white; border-radius:16px;">No hay riesgos registrados. Usa el botón superior para crear uno.</div>';
                return;
            }

            grid.innerHTML = items.map(r => {
                let bg = '#fef3c7'; let textCol = '#d97706'; // Pendiente
                if (r.estado === 'Resuelto') { bg = '#dcfce7'; textCol = '#166534'; }
                else if (r.estado === 'En Curso') { bg = '#dbeafe'; textCol = '#1e40af'; }

                return `
                <div class="card-premium">
                    <div class="badge-status" style="background:${bg}; color:${textCol};">${r.estado}</div>
                    <div style="font-size:11px; font-weight:900; color:#94a3b8; margin-bottom:12px;"><i class="fa-solid fa-triangle-exclamation"></i> Prioridad: ${r.prioridad}</div>
                    <h3 style="margin:0 0 12px; font-size:18px; color:#1e293b; font-weight:950;">${r.riesgo}</h3>
                    <div style="background:#fff7ed; border:1px solid #ffedd5; padding:16px; border-radius:16px; font-size:13px; color:#9a3412; margin-bottom:16px;">
                        <strong>Causa:</strong> ${r.causa}<br>
                        <strong>Impacto:</strong> ${r.impacto}
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:12px; color:#10b981; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width: 60%;">
                            <i class="fa-solid fa-shield-halved"></i> ${r.accion || 'Sin acción'}
                        </span>
                        <button style="background:#f1f5f9; border:none; padding:8px 16px; border-radius:10px; font-size:11px; font-weight:900; cursor:pointer;" onclick="modalRiesgo('${r.id}')">EDITAR</button>
                    </div>
                </div>`;
            }).join('');
        }

        function modalRiesgo(id = null) {
            const data = id ? CACHE_RIESGOS.find(x => x.id === id) : null;
            Swal.fire({
                title: data ? 'Editar Riesgo' : 'Nuevo Riesgo',
                width: '600px',
                html: `
                    <div style="text-align:left;">
                        <input type="hidden" id="fC_id" value="${data ? data.id : ''}">
                        <label style="font-size:12px; font-weight:800;">Descripción del Riesgo</label>
                        <textarea id="fC_riesgo" class="custom-textarea">${data ? data.riesgo : ''}</textarea>
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div><label style="font-size:12px; font-weight:800;">Causa Raíz</label><input id="fC_causa" class="custom-input" value="${data ? data.causa : ''}"></div>
                            <div><label style="font-size:12px; font-weight:800;">Impacto</label><input id="fC_impacto" class="custom-input" value="${data ? data.impacto : ''}"></div>
                        </div>

                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div><label style="font-size:12px; font-weight:800;">Prioridad</label>
                                <select id="fC_prioridad" class="custom-input">
                                    <option ${data?.prioridad == 'Alta' ? 'selected' : ''}>Alta</option>
                                    <option ${data?.prioridad == 'Media' ? 'selected' : ''}>Media</option>
                                    <option ${data?.prioridad == 'Baja' ? 'selected' : ''}>Baja</option>
                                </select>
                            </div>
                            <div><label style="font-size:12px; font-weight:800;">Fecha Objetivo</label><input type="date" id="fC_fechaObj" class="custom-input" value="${data ? data.fechaObjetivo : ''}"></div>
                        </div>
                        
                        <label style="font-size:12px; font-weight:800;">Acción de Mitigación</label>
                        <textarea id="fC_accion" class="custom-textarea">${data ? data.accion : ''}</textarea>
                        
                        <label style="font-size:12px; font-weight:800;">Estado</label>
                        <select id="fC_estado" class="custom-input">
                            <option ${data?.estado == 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option ${data?.estado == 'En Curso' ? 'selected' : ''}>En Curso</option>
                            <option ${data?.estado == 'Resuelto' ? 'selected' : ''}>Resuelto</option>
                        </select>
                    </div>
                `,
                showCancelButton: true, confirmButtonColor: '#00417B', confirmButtonText: 'Guardar',
                preConfirm: () => ({
                    id: document.getElementById('fC_id').value,
                    riesgo: document.getElementById('fC_riesgo').value,
                    causa: document.getElementById('fC_causa').value,
                    impacto: document.getElementById('fC_impacto').value,
                    prioridad: document.getElementById('fC_prioridad').value,
                    accion: document.getElementById('fC_accion').value,
                    fechaObjetivo: document.getElementById('fC_fechaObj').value,
                    estado: document.getElementById('fC_estado').value
                })
            }).then(r => {
                if (r.isConfirmed) {
                    Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
                    google.script.run.withSuccessHandler(res => {
                        if (res.success) { Swal.fire({ icon: 'success', title: 'Guardado', timer: 1500 }); formatoC_load(); }
                    }).formatoC_save(r.value);
                }
            });
        }
        formatoC_load();
    </script>
</div>
