<div id="formatoc_root">
    <style>
        .fc-container { animation: fadeIn 0.4s ease; }
        .fc-header { 
            background: linear-gradient(135deg, var(--c-primary) 0%, #002d56 100%);
            padding: 32px; border-radius: 24px; color: white; margin-bottom: 32px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,65,123,0.15);
        }
        .fc-header h1 { font-size: 26px; font-weight: 950; margin: 0; letter-spacing: -1.5px; }
        .fc-header p { margin: 4px 0 0; opacity: 0.9; font-size: 14px; font-weight: 500; }

        .fc-card { background: white; border-radius: 24px; border: 1px solid var(--line); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .fc-table th { background: #f8fafc; padding: 16px; text-align: left; font-weight: 900; color: #475569; border-bottom: 1px solid var(--line); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .fc-table td { padding: 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        .fc-form-card { max-width: 850px; margin: 0 auto; background: white; border-radius: 32px; border: 1px solid var(--line); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .fc-form-header { padding: 32px 40px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 20px; background: #fcfcfd; border-radius: 32px 32px 0 0; }
        .fc-form-body { padding: 40px; }
        .fc-form-footer { padding: 24px 40px; background: #f8fafc; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 16px; border-radius: 0 0 32px 32px; }
        
        .field-label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .field-input { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 14px; transition: all 0.2s; outline: none; background: #fff; }
        .field-input:focus { border-color: var(--c-primary); box-shadow: 0 0 0 4px rgba(0,65,123,0.1); background: #fff; }
        
        .btn-plus { background: white; color: var(--c-primary); border: none; padding: 12px 20px; border-radius: 14px; font-weight: 900; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>

    <div class="fc-container">
        <!-- List View -->
        <div id="fc_list_view">
            <header class="fc-header">
                <div>
                    <h1>Formato C: Gestión de Riesgos</h1>
                    <p>Identificación y mitigación de brechas críticas</p>
                </div>
                <button class="btn-plus" onclick="FormatoCModule.openForm()">
                    <i class="fa-solid fa-triangle-exclamation"></i> Registrar Riesgo
                </button>
            </header>

            <div class="fc-card">
                <div class="fc-table-wrap">
                    <table class="fc-table">
                        <thead>
                            <tr>
                                <th>Riesgo Identificado</th>
                                <th>Área / PEI</th>
                                <th>Prioridad / Estado</th>
                                <th>Fecha Límite</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="fc_table_body">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Form View -->
        <div id="fc_form_view" style="display:none;">
            <div class="fc-form-card">
                <div class="fc-form-header">
                    <div style="background:#e11d48; color:white; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                        <i class="fa-solid fa-shield-virus"></i>
                    </div>
                    <div>
                        <h2 id="fc_form_title" style="margin:0; font-size:18px; font-weight:950;">Evaluación de Riesgo</h2>
                        <p style="margin:2px 0 0; font-size:12px; color:var(--muted);">Registre planes preventivos y de mitigación</p>
                    </div>
                </div>

                <form id="fc_form_element" onsubmit="FormatoCModule.save(event)">
                    <input type="hidden" id="fc_id">
                    <div class="fc-form-body">
                        <div class="form-grid">
                            <div class="form-col-full">
                                <label class="field-label">Riesgo Detectado *</label>
                                <input type="text" id="fc_riesgo" class="field-input" required placeholder="Describa el evento o condición">
                            </div>
                            
                            <div>
                                <label class="field-label">Área *</label>
                                <select id="fc_area" class="field-input" required onchange="FormatoCModule.handleAreaChange(this.value)">
                                    <option value="">Seleccione área...</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="field-label">Acción PEI (AEI) *</label>
                                <select id="fc_aei" class="field-input" required>
                                    <option value="">Seleccione AEI...</option>
                                </select>
                            </div>

                            <div class="form-col-full">
                                <label class="field-label">Análisis de Causa Raíz *</label>
                                <textarea id="fc_causa" class="field-input" rows="2" required placeholder="¿Por qué sucede este riesgo?"></textarea>
                            </div>

                            <div class="form-col-full">
                                <label class="field-label">Plan de Mitigación *</label>
                                <textarea id="fc_accion" class="field-input" rows="2" required placeholder="Acciones concretas para prevenir el riesgo"></textarea>
                            </div>

                            <div class="form-col-full grid grid-cols-3 gap-6" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                                <div>
                                    <label class="field-label">Prioridad *</label>
                                    <select id="fc_prioridad" class="field-input">
                                        <option value="Alta">Alta</option>
                                        <option value="Media">Media</option>
                                        <option value="Baja">Baja</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="field-label">Fecha Objetivo *</label>
                                    <input type="date" id="fc_fechaObj" class="field-input" required>
                                </div>
                                <div>
                                    <label class="field-label">Estado actual *</label>
                                    <select id="fc_estado" class="field-input">
                                        <option value="Pendiente">Pendiente</option>
                                        <option value="En Curso">En Curso</option>
                                        <option value="Resuelto">Resuelto</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="fa-form-footer">
                        <button type="button" class="btn-obs" onclick="FormatoCModule.closeForm()">Cancelar</button>
                        <button type="submit" class="btn-app">Guardar Riesgo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        /**
         * FormatoCModule (Core v2 Modular)
         */
        window.FormatoCModule = (() => {
            const state = {
                data: [],
                areas: []
            };

            const init = () => {
                load();
            };

            const load = () => {
                ui_showLoading("Cargando riesgos...");
                google.script.run.withSuccessHandler(res => {
                    state.areas = res.areas;
                    renderSelectAreas(res.areas);
                    
                    google.script.run.withSuccessHandler(data => {
                        ui_hideLoading();
                        state.data = data;
                        renderTable(data);
                    }).formatoC_get();
                }).common_getAppData();
            };

            const renderSelectAreas = (areas) => {
                const sel = document.getElementById('fc_area');
                if(!sel) return;
                sel.innerHTML = '<option value="">Seleccione área...</option>' + 
                    areas.map(a => `<option value="${a.id}">${a.label}</option>`).join('');
            };

            const handleAreaChange = (areaId) => {
                const sel = document.getElementById('fc_aei');
                sel.innerHTML = '<option value="">Cargando...</option>';
                google.script.run.withSuccessHandler(aeis => {
                    if(!aeis || !aeis.length) {
                        sel.innerHTML = '<option value="">Sin vinculación PEI</option>';
                    } else {
                        sel.innerHTML = '<option value="">Seleccione AEI...</option>' + 
                            aeis.map(a => `<option value="${a.codAei}">[${a.codAei}] ${a.accion}</option>`).join('');
                    }
                }).common_getVinculacion(areaId);
            };

            const renderTable = (items) => {
                const tbody = document.getElementById('fc_table_body');
                if(!items.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-10 text-muted">No hay riesgos identificados.</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(it => {
                    let badgeClass = 'badge-obs';
                    if(it.prioridad === 'Alta') badgeClass = 'badge-danger';
                    if(it.prioridad === 'Media') badgeClass = 'badge-warning';
                    if(it.prioridad === 'Baja') badgeClass = 'badge-success';

                    return `
                        <tr>
                            <td>
                                <div class="font-black text-slate-800">${it.riesgo}</div>
                                <div class="text-[10px] text-muted font-bold">CAUSA: ${it.causa || '-'}</div>
                            </td>
                            <td>
                                <div class="text-xs font-black text-primary uppercase">${it.area}</div>
                                <div class="text-[10px] text-slate-500 font-bold">PEI: ${it.codAei}</div>
                            </td>
                            <td>
                                <div class="mb-1"><span class="badge ${badgeClass}">${it.prioridad}</span></div>
                                <div class="text-[10px] font-black uppercase text-slate-400">${it.estado}</div>
                            </td>
                            <td><div class="text-xs font-black text-slate-700">${it.fechaObjetivo}</div></td>
                            <td class="text-right">
                                <button class="btn-icon" onclick="FormatoCModule.edit('${it.id}')" title="Editar">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            };

            const openForm = () => {
                document.getElementById('fc_list_view').style.display = 'none';
                document.getElementById('fc_form_view').style.display = 'block';
                document.getElementById('fc_form_element').reset();
                document.getElementById('fc_id').value = '';
                document.getElementById('fc_form_title').textContent = 'Registro de Riesgo';
            };

            const closeForm = () => {
                document.getElementById('fc_list_view').style.display = 'block';
                document.getElementById('fc_form_view').style.display = 'none';
            };

            const edit = (id) => {
                const it = state.data.find(x => x.id === id);
                if(!it) return;
                
                openForm();
                document.getElementById('fc_form_title').textContent = 'Editar Riesgo';
                document.getElementById('fc_id').value = it.id;
                document.getElementById('fc_riesgo').value = it.riesgo;
                document.getElementById('fc_area').value = it.area;
                document.getElementById('fc_causa').value = it.causa;
                document.getElementById('fc_accion').value = it.accion;
                document.getElementById('fc_prioridad').value = it.prioridad;
                document.getElementById('fc_fechaObj').value = it.fechaObjetivo;
                document.getElementById('fc_estado').value = it.estado;
                
                handleAreaChange(it.area);
                setTimeout(() => { document.getElementById('fc_aei').value = it.codAei; }, 800);
            };

            const save = (e) => {
                e.preventDefault();
                const data = {
                    id: document.getElementById('fc_id').value,
                    riesgo: document.getElementById('fc_riesgo').value,
                    area: document.getElementById('fc_area').value,
                    codAei: document.getElementById('fc_aei').value,
                    causa: document.getElementById('fc_causa').value,
                    accion: document.getElementById('fc_accion').value,
                    prioridad: document.getElementById('fc_prioridad').value,
                    fechaObjetivo: document.getElementById('fc_fechaObj').value,
                    estado: document.getElementById('fc_estado').value
                };

                ui_showLoading("Guardando riesgo...");
                google.script.run.withSuccessHandler(res => {
                    ui_hideLoading();
                    if(res.success) {
                        Swal.fire('Éxito', 'Riesgo registrado correctamente', 'success');
                        closeForm();
                        load();
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                }).formatoC_save(data);
            };

            return { init, openForm, closeForm, edit, save, handleAreaChange };
        })();
    </script>
</div>
