<div id="formatoC_root">
    <style>
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #00417B 0%, #002d56 100%);
            padding: 40px;
            border-radius: 24px;
            color: white;
            box-shadow: 0 20px 40px -12px rgba(0, 65, 123, 0.3);
        }

        .grid-riesgos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .card-premium {
            background: white;
            border-radius: 24px;
            border: 1px solid #f1f5f9;
            padding: 24px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .card-premium:hover {
            border-color: #f59e0b;
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.15);
            transform: translateY(-5px);
        }

        .badge-status {
            position: absolute;
            top: 24px;
            right: 24px;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .status-pendiente {
            background: #fef3c7;
            color: #d97706;
        }

        .status-encurso {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-resuelto {
            background: #dcfce7;
            color: #166534;
        }

        .custom-input,
        .custom-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            background: #fcfcfd;
        }
    </style>

    <div class="header-actions">
        <div>
            <h2 style="margin:0; font-size:32px; font-weight:950;">Formato C: Riesgos</h2>
            <p style="margin:8px 0 0; opacity:0.9; font-weight:500;">Gestión de brechas y acciones de mitigación</p>
        </div>
        <button
            style="background:white; color:#00417B; border:none; padding:14px 24px; border-radius:12px; font-weight:900; cursor:pointer;"
            onclick="modalRiesgo()">
            + Registrar Riesgo
        </button>
    </div>

    <div id="gridRiesgos" class="grid-riesgos"></div>

    <script>
        let CACHE_RIESGOS = [];

        function formatoC_load() {
            google.script.run.withSuccessHandler(data => {
                CACHE_RIESGOS = data;
                renderRiesgos(data);
            }).formatoC_get();
        }

        function renderRiesgos(items) {
            const grid = document.getElementById('gridRiesgos');
            if (!items.length) { grid.innerHTML = '<div style="grid-column:1/-1; padding:40px; text-align:center; color:#64748b; font-weight:800;">No hay riesgos registrados.</div>'; return; }

            grid.innerHTML = items.map(r => {
                const sClass = r.estado.toLowerCase().replace(/\s/g, '');
                return `
                <div class="card-premium">
                    <div class="badge-status status-${sClass}">${r.estado}</div>
                    <div style="font-size:11px; font-weight:900; color:#94a3b8; margin-bottom:12px;"><i class="fa-solid fa-triangle-exclamation"></i> ANÁLISIS DE BRECHA</div>
                    <h3 style="margin:0 0 12px; font-size:18px; color:#1e293b; font-weight:950;">${r.brecha}</h3>
                    <div style="background:#fff7ed; border:1px solid #ffedd5; padding:16px; border-radius:16px; font-size:13px; color:#9a3412; margin-bottom:16px;">
                        <strong>Causa:</strong> ${r.causa}<br>
                        <strong>Impacto:</strong> ${r.impacto}
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:12px; color:#10b981; font-weight:800; max-width:65%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            <i class="fa-solid fa-shield-halved"></i> ${r.accion || 'Sin acción'}
                        </span>
                        <button style="background:#f1f5f9; border:none; padding:8px 16px; border-radius:10px; font-size:11px; font-weight:900; cursor:pointer; color:#475569;" onclick="modalRiesgo('${r.id}')">EDITAR</button>
                    </div>
                </div>`;
            }).join('');
        }

        function modalRiesgo(id = null) {
            const data = id ? CACHE_RIESGOS.find(x => x.id === id) : null;
            Swal.fire({
                title: data ? 'Editar Riesgo' : 'Nuevo Riesgo',
                width: '600px',
                html: `
                    <div style="text-align:left;">
                        <input type="hidden" id="fC_id" value="${data ? data.id : ''}">
                        <label style="font-size:12px; font-weight:800;">Descripción de la Brecha / Riesgo *</label>
                        <textarea id="fC_brecha" class="custom-textarea">${data ? data.brecha : ''}</textarea>
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div><label style="font-size:12px; font-weight:800;">Causa Raíz</label><input id="fC_causa" class="custom-input" value="${data ? data.causa : ''}"></div>
                            <div><label style="font-size:12px; font-weight:800;">Impacto</label><input id="fC_impacto" class="custom-input" value="${data ? data.impacto : ''}"></div>
                        </div>
                        
                        <label style="font-size:12px; font-weight:800;">Acción de Mitigación</label>
                        <textarea id="fC_accion" class="custom-textarea">${data ? data.accion : ''}</textarea>
                        
                        <label style="font-size:12px; font-weight:800;">Estado</label>
                        <select id="fC_estado" class="custom-input">
                            <option ${data?.estado == 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option ${data?.estado == 'En curso' ? 'selected' : ''}>En curso</option>
                            <option ${data?.estado == 'Resuelto' ? 'selected' : ''}>Resuelto</option>
                        </select>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonColor: '#00417B',
                confirmButtonText: 'Guardar',
                preConfirm: () => ({
                    id: document.getElementById('fC_id').value,
                    brecha: document.getElementById('fC_brecha').value,
                    causa: document.getElementById('fC_causa').value,
                    impacto: document.getElementById('fC_impacto').value,
                    accion: document.getElementById('fC_accion').value,
                    estado: document.getElementById('fC_estado').value
                })
            }).then(r => {
                if (r.isConfirmed) {
                    Swal.fire({ title: 'Guardando...', didOpen: () => Swal.showLoading() });
                    google.script.run.withSuccessHandler(res => {
                        if (res.success) { Swal.fire({ icon: 'success', title: 'Guardado', timer: 1500 }); formatoC_load(); }
                        else Swal.fire('Error', res.message, 'error');
                    }).formatoC_save(r.value);
                }
            });
        }
        formatoC_load();
    </script>
</div>
