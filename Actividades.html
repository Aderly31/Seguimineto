<div class="mod-container">
  <div class="mod-hero">
    <div class="mod-hero-content">
      <h1 class="mod-title"><i class="fa-solid fa-list-check"></i> Actividades</h1>
      <p class="mod-subtitle">Gestión de actividades y su impacto</p>
    </div>
    <div class="mod-hero-actions">
      <div class="mod-search">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="actividadesSearch" placeholder="Buscar actividad..." oninput="actividades_filterTable()">
      </div>
      <span class="mod-count" id="actividadesCount">0 registros</span>
    </div>
  </div>

  <div class="mod-card">
    <div class="mod-table-wrapper">
      <table class="mod-table" id="actividadesTable">
        <thead>
          <tr>
            <th>Título</th>
            <th>Área</th>
            <th>Código AEI</th>
            <th>Descripción</th>
            <th>Impacto</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="actividadesBody"></tbody>
      </table>
    </div>
    <div class="mod-empty" id="actividadesEmpty">
      <i class="fa-solid fa-list-check"></i>
      <p>No hay actividades registradas</p>
    </div>
  </div>
</div>



<script>
  window.actividades_init = function() {
    loadActividades();
  };

  function loadActividades() {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          window._actividadesData = res.data || [];
          actividades_renderTable(window._actividadesData);
        } else {
          ui_showError("Error al cargar actividades");
        }
      })
      .withFailureHandler(err => {
        console.error("Error Actividades:", err);
        ui_showError("Error al cargar actividades");
      })
      .actividades_list();
  }

  window.actividades_renderTable = function(data) {
    const tbody = document.getElementById('actividadesBody');
    const empty = document.getElementById('actividadesEmpty');
    const count = document.getElementById('actividadesCount');

    count.textContent = data.length + ' registros';

    if (!data.length) {
      tbody.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    tbody.innerHTML = data.map(r => {
      const estadoClass = {
        'completado': 'badge-ok', 'completo': 'badge-ok', 'ok': 'badge-ok',
        'en proceso': 'badge-warn', 'proceso': 'badge-warn', 'pendiente': 'badge-warn',
        'no iniciado': 'badge-err'
      }[String(r.estado || '').toLowerCase().trim()] || 'badge-info';

      return `<tr>
        <td><strong>${esc(r.titulo || '')}</strong></td>
        <td>${esc(r.area || '')}</td>
        <td><span class="badge badge-info">${esc(r.codAei || r.codaei || '')}</span></td>
        <td>${esc(r.descripcion || '')}</td>
        <td>${esc(r.impacto || '')}</td>
        <td><span class="badge ${estadoClass}">${esc(r.estado || '')}</span></td>
      </tr>`;
    }).join('');
  };

  window.actividades_filterTable = function() {
    const q = document.getElementById('actividadesSearch').value.toLowerCase().trim();
    const data = window._actividadesData || [];
    if (!q) return actividades_renderTable(data);
    const filtered = data.filter(r =>
      String(r.titulo || '').toLowerCase().includes(q) ||
      String(r.area || '').toLowerCase().includes(q) ||
      String(r.descripcion || '').toLowerCase().includes(q) ||
      String(r.codAei || r.codaei || '').toLowerCase().includes(q)
    );
    actividades_renderTable(filtered);
  };


</script>
